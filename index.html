  flow:[{l:"AI Drafts Content",s:"ChatGPT and Jasper"},{l:"You Refine and Brand",s:"Add strategy and voice"},{l:"Deliver to Client",s:"Professional quality"},{l:"Monthly Retainer",s:"Recurring income"}],
  intro:"Content agencies powered by AI can produce 10 times the output of traditional agencies at a fraction of the cost. By using AI to draft and you to strategize, edit, and brand, you can offer competitive pricing while maintaining premium quality and strong profit margins. The market for content services is enormous and growing as businesses increasingly recognize they need consistent, high-quality content to compete online.",
  lessons:[
    {t:"Building Your AI Content Agency Service Stack",pts:["Blog post packages: 4 to 8 SEO-optimized articles per month at $500 to $3,000 per client. AI drafts in 10 minutes, you edit for quality and brand voice in 20 minutes","Social media management: 15 to 20 posts per month across platforms at $500 to $1,500 per client. Batch create with AI, schedule with Buffer or Later, review for accuracy","Email newsletters: weekly or bi-weekly newsletters at $300 to $1,000 per client. AI generates draft content, you add strategy, relevance, and personality","Video scripts: $150 to $500 per script. AI handles research and structure, you add hooks, specific examples, and the client's unique perspective"]},
    {t:"Getting and Keeping Clients",pts:["Start with 3 clients at below-market rates in exchange for testimonials and case studies. These become your portfolio for charging premium rates","Specialize in one industry for your first 6 months. A content agency for dental practices, or for e-commerce brands, or for B2B SaaS companies is far more hireable than a generalist","Use a content audit as your sales process: analyze a prospect's current content, show them specific gaps, and propose a solution. This demonstrates expertise before asking for money","Retention comes from reporting. Send monthly reports showing content published, keyword rankings improved, and leads generated. Numbers keep clients subscribed even through leadership changes"]}
  ],
  tools:[
{name:"ChatGPT + Custom GPTs",icon:"🤖",cat:"Content Creation",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"$20/mo",costType:"paid",steps:[
  "Go to <strong>chat.openai.com</strong> and upgrade to Plus ($20/mo) to access Custom GPTs.",

{name:"SurferSEO",icon:"🏄",cat:"SEO Content",catColor:"rgba(0,229,255,0.12)",catTxt:"#00B8CC",cost:"$89/mo",costType:"paid",steps:[

{id:23,tier:4,title:"Chatbot Building for Clients",tagline:"Build AI-powered chat assistants that generate leads and support customers 24/7",tag:"AI Services",img:IMGS.ai,
  stats:[{l:"Startup Cost",v:"₦0 to ₦16k0/mo"},{l:"Income Potential",v:"₦2M to ₦32M/mo"},{l:"First Income",v:"1 to 3 weeks"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Define Bot Purpose",s:"Lead gen or support"},{l:"Build with No-Code",s:"ManyChat or Voiceflow"},{l:"Deploy to Client Site",s:"Website or social"},{l:"Monthly Maintenance",s:"Recurring retainer"}],
  intro:"Businesses of every size need chatbots to handle customer inquiries, qualify leads, and book appointments outside of business hours. AI-powered chatbots built on GPT-4 can now have genuine conversations that convert visitors into leads at rates significantly higher than static contact forms. Building these chatbots for clients requires no traditional coding knowledge and can be done entirely with no-code tools.",
  lessons:[
    {t:"Chatbot Use Cases That Businesses Pay For Immediately",pts:["Lead qualification bots: ask website visitors qualifying questions and collect contact information before scheduling a sales call. Replaces a human appointment setter","FAQ bots: answer the 20 most common customer questions automatically. Reduces support ticket volume by 40 to 60% for most businesses","E-commerce product recommendation bots: guide shoppers to the right product based on their answers to 3 to 5 questions. Increases average order value and conversion rate","Restaurant and service business booking bots: take reservations, collect allergy information, and send confirmation emails without any human involvement"]},
    {t:"Building and Deploying Your First Chatbot",pts:["Voiceflow and Botpress are the best platforms for building custom GPT-powered chatbots with no coding required","ManyChat is the best platform for Instagram and Facebook Messenger automation with deep CRM integration","Always define the bot's scope clearly before building. A bot trying to do everything does nothing well. One clear purpose, done excellently, is worth more than a complex multi-purpose bot","Test with at least 50 different conversation paths before handing to a client. Edge cases kill trust and clients want to see your quality assurance process"]}
  ],
  tools:[
{name:"Voiceflow",icon:"💬",cat:"Chatbot Builder",catColor:"rgba(0,229,255,0.12)",catTxt:"#00B8CC",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>voiceflow.com</strong> and sign up free. Click <em>New Project → Web Chat Agent</em>.",
  "The canvas shows a flow diagram. Start with a <strong>Start</strong> block connected to a <strong>Speak</strong> block for your greeting message.",
  "Add a <strong>Choice</strong> block for multiple options: e.g. <em>What do you need help with? 1. Product Info 2. Pricing 3. Support</em>. Connect each choice to the appropriate next block.",

  "Test your bot using the <strong>Preview</strong> button in the top right. Chat with it yourself and fix any broken paths.",
  "When ready click <strong>Publish → Web Chat</strong>. Copy the embed code and paste it into any website's HTML just before the closing <code>&lt;/body&gt;</code> tag."

{name:"ManyChat",icon:"📱",cat:"Social Chatbots",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free tier",costType:"free",steps:[

{name:"Typebot",icon:"🤖",cat:"Website Chatbot",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free tier",costType:"free",steps:[

{id:24,tier:4,title:"AI-Generated Digital Products",tagline:"Use AI to create and publish digital products at a scale humans cannot match",tag:"AI Products",img:IMGS.ai,
  stats:[{l:"Startup Cost",v:"₦32k to ₦16k0/mo"},{l:"Income Potential",v:"₦800k to ₦32M/mo"},{l:"First Income",v:"1 to 4 weeks"},{l:"Difficulty",v:"Beginner"}],
  flow:[{l:"Prompt AI for Content",s:"Research and draft"},{l:"Edit and Brand",s:"Add human quality"},{l:"Publish on Platforms",s:"Etsy, Gumroad, KDP"},{l:"Earn Passively",s:"Scale with volume"}],
  intro:"AI allows a single creator to publish at a scale that was previously impossible without a team. Ebooks researched and drafted by AI. Notion templates structured by AI. Low-content KDP books designed with AI assistance. Coloring books illustrated by Midjourney. The key is not replacing quality with automation, but using AI to handle the 80% of the work that is mechanical so you can focus on the 20% that requires genuine human judgment and curation.",
  lessons:[
    {t:"AI Digital Product Types That Scale",pts:["KDP low-content books: AI generates the interior layout concept, you finalize the design in Canva, and publish on Amazon KDP. Activity books, journals, and notebooks require zero writing","AI-researched ebooks: use Perplexity or ChatGPT to research and draft an ebook on a specific topic. Edit heavily for quality, accuracy, and your unique perspective before publishing","Notion and Canva templates: describe your template to AI, get a structural outline, then build it yourself. AI cuts planning time by 70%","AI-illustrated art prints and digital art: Midjourney or DALL-E generates unique artwork. Sell as digital downloads on Etsy or as print-on-demand products through Printful"]},
    {t:"Quality Control: Making AI Products Actually Good",pts:["Never publish raw AI output. It is a starting point, never a finished product. Every AI-created product needs human review for accuracy, coherence, and genuine value","Test your products: would you personally pay for this? If the answer is no, improve it until yes","Collect buyer feedback actively. The gap between what AI generates and what customers truly want is where human curation creates a durable competitive advantage","Build a brand around your curation and taste. Buyers return to creators whose work they trust, not to anonymous listings. Your eye for quality is the real product"]}
  ],
  tools:[
{name:"ChatGPT (Product Creation)",icon:"🤖",cat:"AI Writing",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free / $20/mo",costType:"free",steps:[
  "Go to <strong>chat.openai.com</strong> and sign in. For ebook creation use this prompt: <em>Write a complete 3,000-word guide on [topic] structured with an introduction, 5 chapters with subheadings, and a conclusion. Write in a practical, conversational tone.</em>",
  "For prompt packs: <em>Create 50 highly effective ChatGPT prompts for [target audience, e.g. freelance copywriters]. Format: numbered list. Each prompt should be specific and actionable.</em>",
  "Refine the output: paste it back and say <em>Make this more specific. Add concrete examples. Remove any vague advice.</em> Iterate until it's genuinely valuable.",
  "For templates: describe the template structure and ask ChatGPT to populate it with real examples. Then format in Canva or Notion.",
  "Use ChatGPT to write your <strong>product description</strong>: <em>Write a compelling 200-word product description for [product name] targeting [audience]. Emphasize the outcome, not the features.</em>",
  "Use ChatGPT to create your <strong>marketing content</strong>: email announcement, 5 social posts, and 3 ad variations — all in one session."
]},
{name:"Canva (Product Design)",icon:"🎨",cat:"Design",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free / $13/mo",costType:"free",steps:[
  "Go to <strong>canva.com</strong>. For ebooks: click <em>Create a Design → Ebook</em> (8.5x11 inches). Choose a professional template.",
  "Replace template text with your ChatGPT-generated content. Keep formatting clean: max 2 fonts, consistent heading styles, and white space.",
  "For prompt packs and checklists: use a <strong>A4 or Letter-size</strong> template. Create a title page, content pages with consistent row styling, and a back cover.",
  "Add a cover that converts: bold title, subtitle explaining the benefit, your name or brand, and a visual element that matches the topic.",
  "Export as <strong>PDF Standard</strong> for readable products or <strong>PDF Print</strong> for printable products. PNG for social media previews.",

{name:"Gumroad",icon:"💚",cat:"Sales Platform",catColor:"rgba(123,110,255,0.12)",catTxt:"#7B6EFF",cost:"Free (10% fee)",costType:"free",steps:[

{id:25,tier:4,title:"Prompt Engineering as a Service",tagline:"The skill that unlocks the full potential of AI for businesses willing to pay for it",tag:"AI Consulting",img:IMGS.code,
  stats:[{l:"Startup Cost",v:"₦0"},{l:"Income Potential",v:"₦2M to ₦32M/mo"},{l:"First Income",v:"1 to 3 weeks"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Master Prompting",s:"Learn systematically"},{l:"Build Prompt Library",s:"Proven templates"},{l:"Sell to Businesses",s:"Consulting or productized"},{l:"Maintain and Expand",s:"Ongoing relationship"}],
  intro:"Prompt engineering is the practice of crafting precise AI instructions to produce consistently excellent, usable outputs. As businesses rapidly adopt AI tools, the gap between organizations that use AI effectively and those that use it poorly grows wider. Prompt engineers command $80 to $200 per hour because the skill is new, high-leverage, and most business owners simply do not have the time to develop it themselves.",
  lessons:[
    {t:"Advanced Prompting Techniques That Produce Professional Results",pts:["Chain of Thought (CoT): instruct the AI to reason step-by-step before giving its final answer. This dramatically improves accuracy on complex analytical tasks","Role and Context: give the AI a specific expert role, the audience it is writing for, and the purpose of the output. This single change improves output quality by 40 to 60%","Output format specification: tell the AI exactly how to format its response. 'Write this as a numbered list with 1-sentence explanations' produces far more usable output than an open-ended request","Iterative refinement prompts: after receiving an initial response, use follow-up prompts like 'Make the tone more conversational' or 'Add specific data points to support each claim' to refine without starting over"]},
    {t:"Productizing Prompt Engineering",pts:["Prompt packs: collections of 10 to 30 prompts for specific use cases sold as digital products on Gumroad for $19 to $97. A prompt pack for real estate agents, or for customer service managers, or for content creators","Prompt consulting: audit a business's AI workflow and deliver a custom prompt library plus training for $500 to $3,000 per engagement","Monthly prompt maintenance: as AI models update, prompts sometimes need adjustment. Offer a retainer to keep a client's prompt library current and optimized","AI workflow training workshops: teach teams how to use AI tools effectively. Corporate workshops charge $500 to $5,000 per session depending on company size"]}
  ],
  tools:[
{name:"ChatGPT (Prompt Testing)",icon:"🤖",cat:"Testing Ground",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free / $20/mo",costType:"free",steps:[
  "Go to <strong>chat.openai.com</strong>. Every prompt you build must be tested here first across multiple runs to check consistency.",
  "The anatomy of a high-quality prompt: <strong>Role</strong> (who the AI is), <strong>Context</strong> (background info), <strong>Task</strong> (what to do), <strong>Format</strong> (how to structure output), <strong>Constraints</strong> (what to avoid).",
  "Test each prompt minimum 5 times. If the output varies wildly between runs, the prompt is too vague. Add more specific constraints until output is consistently good.",
  "Use <strong>System Prompts</strong> (in the API) to set persistent instructions that apply to every message in a session — essential for client deliverables.",
  "Use the <strong>Temperature</strong> setting (API only): 0 = deterministic and factual, 1 = creative and varied. Match temperature to use case.",
  "Document every working prompt in a Notion database with: prompt text, use case, model version tested on, output quality rating, and example output."
]},
{name:"PromptBase",icon:"🏪",cat:"Prompt Marketplace",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free to list",costType:"free",steps:[
  "Go to <strong>promptbase.com</strong> and create a seller account. PromptBase takes 20% commission per sale.",
  "Click <strong>Sell → New Prompt</strong>. Choose your AI model (ChatGPT, Midjourney, DALL-E, etc). Add your prompt title and description.",
  "Price your prompts between $1.99 and $9.99. Bundles of 5 to 10 prompts for $14.99 to $29.99 often outperform individual prompts.",
  "The description is your sales copy: explain exactly what the prompt does, what output it produces, and show 3 to 5 example outputs.",
  "Upload example outputs as images (for image prompts) or text screenshots. Listings with examples convert at 3x the rate of listings without.",
  "Promote your PromptBase listing by sharing example outputs on Twitter and LinkedIn with the link. Consistency of promotion is the main driver of sales."
]},
{name:"Notion (Prompt Library)",icon:"📋",cat:"Organization",catColor:"rgba(123,110,255,0.12)",catTxt:"#7B6EFF",cost:"Free",costType:"free",steps:[
  "Go to <strong>notion.so</strong> and create a new database called <strong>Prompt Library</strong>.",
  "Add columns: Prompt Name, Category, AI Model, Prompt Text (long text), Quality Score (1-5), Use Case, Example Output, Date Created.",
  "Fill in 20 to 30 of your best tested prompts. This becomes your competitive advantage — a proprietary library of proven prompts.",
  "Create a <strong>Gallery View</strong> sorted by Quality Score descending. Your best prompts are always at the top.",
  "Create separate views for each category: Writing, Marketing, Research, Coding, Design Briefs, etc.",
  "Share a curated subset of your library as a paid product: export selected rows to a formatted PDF or Notion template and sell it."
]}
],
  actions:["Build a personal prompt library of 50 prompts you use regularly across different tasks","Test each prompt with 5 variations to identify the highest-performing version","Package 20 to 30 prompts into a focused prompt pack and list on PromptBase or Gumroad","Reach out to 10 small businesses and offer a free AI audit in exchange for a paid proposal meeting","Document your results with before-and-after examples to use as case studies in your sales conversations"],
  videos:[{t:"Prompt Engineering Tutorial: Master AI Prompting",q:"prompt engineering tutorial master chatgpt claude 2024",ch:"Search: Riley Brown or Andrew Ng DeepLearning.AI"}]
},

{id:27,tier:5,title:"Copywriting for Profit",tagline:"The single most transferable, highest-paid skill in the digital economy",tag:"High Income Skill",img:IMGS.write,
  stats:[{l:"Startup Cost",v:"₦0"},{l:"Income Potential",v:"₦5M to ₦80M/mo"},{l:"First Income",v:"1 to 4 weeks"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Learn Psychology",s:"Why people buy"},{l:"Study Successful Copy",s:"Reverse engineer winners"},{l:"Practice Daily",s:"Write every day"},{l:"Get Paid to Write",s:"$50 to $500 per hour"}],
  intro:"Copywriting is the art of writing words that persuade people to take a specific action: to click, buy, sign up, or believe. Every business on earth needs it. A skilled copywriter who can write landing pages, email sequences, and ad copy can earn $5,000 to $50,000 per project. It is the single most transferable high-value skill in the entire digital economy because it can be applied to your own businesses or sold as a service to others.",
  lessons:[
    {t:"The Psychology of Persuasion: Why People Actually Buy",pts:["People do not buy products. They buy outcomes, identities, and relief from pain. The strongest motivation is always moving away from pain, not moving toward gain","The core psychological drivers: fear of loss (always more powerful than desire for gain), desire for status and social proof, need for certainty and risk reduction, and the aspiration to become a specific type of person","Before writing a single word, answer these questions: Who specifically is your reader? What is the single problem they most urgently want solved? What does their ideal life after solving it look like?","Write to one specific person, not a general audience. The most converting copy ever written reads like a personal letter to someone who feels deeply understood"]},
    {t:"The 5 Copy Formats Every Copywriter Should Master",pts:["Sales Pages and Landing Pages: long-form copy following the structure: headline, pain agitation, solution introduction, features as benefits, social proof, objection handling, offer with guarantee, and a single call to action","Email Sequences: automated sequences that convert subscribers. A 7-email sequence converting at 3% to a $497 product is worth $14,910 per 100 subscribers and runs on autopilot","Facebook and Google Ads: short copy that stops the scroll and drives clicks. Test 5 to 10 variations of every ad because the winning control often surprises even experienced copywriters","Video Sales Letters (VSLs): scripts for 10 to 30-minute sales videos. Some VSLs generate over $1 million in revenue when properly distributed","Product descriptions: e-commerce copy that converts browsers. Focus on benefits over features, use sensory and specific language, and answer the main objection before the customer asks it"]},
    {t:"Building a Copywriting Portfolio That Attracts High-Paying Clients",pts:["Your first portfolio pieces should be spec work: rewrite existing ads, landing pages, or emails that you find in the wild and make them demonstrably better","Pick one industry niche for your first 6 months. A copywriter specializing in SaaS onboarding emails commands 2 to 3 times the rate of a generalist","Case studies are more valuable than samples. Document the results your copy produced: a specific landing page increased conversion from 2.1% to 4.8%, generating 128% more revenue from the same traffic","Platforms to find clients: Upwork for beginners building their first reviews, LinkedIn for mid-level and senior copywriting clients, and your own content marketing for inbound leads"]}
  ],
  tools:[
{name:"Google Docs",icon:"📄",cat:"Writing",catColor:"rgba(0,229,255,0.12)",catTxt:"#00B8CC",cost:"Free",costType:"free",steps:[
  "Go to <strong>docs.google.com</strong> and create a new document. Use Google Docs for all client deliverables — easy to share and collaborate.",
  "Set up a <strong>Copy Template</strong>: create a master doc with sections for: Headline Options (5 to 10 variations), Lead/Hook, Body Copy, Objection Handling, CTA Options.",
  "Use <strong>Styles</strong> (Heading 1, 2, 3) consistently — this helps clients navigate long documents and looks professional.",
  "Enable <strong>Suggesting Mode</strong> (pencil icon → Suggesting) when editing client-provided copy so they can see exactly what you changed and why.",
  "Use <strong>Version History</strong> (File → Version History → See Version History) to restore any previous draft if a client wants an older version back.",
  "Share via <strong>Share → Anyone with the link → Commenter</strong>. Clients can comment but not edit your copy directly, protecting your work."
]},
{name:"Hemingway Editor",icon:"✍",cat:"Writing Quality",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free (web)",costType:"free",steps:[
  "Go to <strong>hemingwayapp.com</strong> and paste your copy into the editor.",
  "The app highlights issues in colors: <span style='color:red'>Red</span> = very hard to read sentences (split them), <span style='color:orange'>Orange</span> = hard to read, <span style='color:purple'>Purple</span> = complex words with simpler alternatives, <span style='color:blue'>Blue</span> = adverbs to remove, <span style='color:green'>Green</span> = passive voice.",
  "Aim for <strong>Grade 6 to 8</strong> readability. Simpler copy almost always converts better than sophisticated-sounding copy.",
  "Remove every adverb that Hemingway flags unless it truly changes meaning. <em>Very quickly</em> → <em>fast</em>. <em>Extremely important</em> → <em>critical</em>.",
  "Rewrite all passive voice: <em>The button was clicked by the user</em> → <em>The user clicked the button</em>. Active voice is 30% more persuasive.",
  "Final check: read your copy out loud. If you stumble anywhere, the sentence needs rewriting. Copy that reads smoothly out loud converts better."
]},
{name:"ClickFunnels / Systeme.io",icon:"🔄",cat:"Sales Pages",catColor:"rgba(255,45,107,0.12)",catTxt:"#CC2255",cost:"Free (Systeme)",costType:"free",steps:[
  "Go to <strong>systeme.io</strong> and sign up free (free plan includes unlimited sales funnels). Click <em>Funnels → Create</em>.",
  "Choose <strong>Sales Funnel</strong> template. Systeme gives you a pre-built 3-page funnel: Sales Page → Order Form → Thank You Page.",
  "Edit the Sales Page: click any element to edit. Replace headline, subheadline, bullets, and CTA button text with your copy.",
  "Add sections using the <strong>+</strong> button: hero section, benefits, social proof, pricing, FAQ, and final CTA. This mirrors the classic long-form sales page structure.",
  "Connect payment: go to <strong>Settings → Payment Gateway</strong>. Connect Stripe or PayPal. Set your product price in the Order Form page.",
  "Publish and test: click <strong>Preview</strong> to see your page live. Process a test order yourself before sharing with a real audience."
]}
],

},
{id:28,tier:5,title:"Social Media Marketing Agency (SMMA)",tagline:"Run paid social for businesses and charge predictable monthly retainers",tag:"Agency",img:IMGS.phone,
  stats:[{l:"Startup Cost",v:"₦0 to ₦320k"},{l:"Income Potential",v:"₦5M to ₦160M/mo"},{l:"First Income",v:"2 to 6 weeks"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Choose Niche",s:"One industry to start"},{l:"Outreach for Clients",s:"Cold DM or email"},{l:"Run Ad Campaigns",s:"Meta or TikTok ads"},{l:"Monthly Retainer",s:"$1k to $5k per client"}],
  intro:"A Social Media Marketing Agency manages paid and organic social media for business clients on a recurring monthly retainer. The model is straightforward: acquire clients, deliver measurable results, charge a premium for ongoing management. With 5 clients at $2,000 per month, you are clearing $10,000 per month. With 15 clients and a small team, you are building toward $50,000 per month and beyond.",
  lessons:[
    {t:"Getting Your First SMMA Client",pts:["Choose one niche for your first 6 months: dental practices, fitness studios, real estate agents, restaurants, or local e-commerce brands. Niching makes your pitch 10 times more compelling","The audit approach: find a prospect's Instagram or Facebook page, identify 3 specific improvements their content or ads could make, and send those observations as your opening message","Your outreach formula: observation about their current social presence, one specific idea for improvement, and a question asking if they would be open to a 15-minute call to discuss it","Expect to contact 100 businesses before signing your first client. This is not a low numbers game, but a momentum game. The 101st contact gets easier than the 1st"]},
    {t:"Delivering Results That Keep Clients Subscribed",pts:["Month 1 is strategy and testing: no client should be judged on month 1 results. Set expectations clearly in your onboarding call","KPIs that matter: cost per lead for service businesses, return on ad spend (ROAS) for e-commerce, and follower growth plus engagement rate for brand awareness clients","Monthly reports with clear visuals showing spend, reach, leads, and conversions keep clients confident even during testing phases","A client who feels informed stays subscribed. A client who feels left in the dark cancels even when results are good"]},
    {t:"Scaling from Solo to Agency",pts:["Hire a media buyer or ad manager once you have 5 or more clients and cannot manage campaigns effectively alone","Use a CRM and project management tool from day one so that handing off client accounts to team members is a documented process, not a scramble","Standardize your service offering: instead of custom work for every client, create 3 service tiers at fixed prices. This makes delivery scalable and pitching predictable","Agency growth is a referral business. Ask every client after 3 months for one referral in exchange for a bonus service or a credit on their next invoice"]}
  ],
  tools:[
{name:"Meta Business Suite",icon:"📘",cat:"Ad Management",catColor:"rgba(0,229,255,0.12)",catTxt:"#00B8CC",cost:"Free",costType:"free",steps:[
  "Go to <strong>business.facebook.com</strong> and create your Business Manager account. This is your agency hub — all client accounts live here.",
  "Click <strong>Add People</strong> to invite team members. Assign roles: Admin (full access), Analyst (view only), Advertiser (can run ads).",
  "Click <strong>Add Accounts → Request Access to an Ad Account</strong>. Enter the client's ad account ID and request access. Client approves from their end.",
  "Go to <strong>Ads Manager → Create Campaign</strong>. Choose objective: Traffic (website visits), Engagement (likes/comments), Leads (form fills), or Conversions (purchases).",
  "Create your Ad Set: define audience (age, location, interests), budget ($10 to $50/day to start), and placements (Facebook Feed, Instagram Feed, Reels).",
  "Create your Ad: upload image/video, write headline (40 chars max), primary text (125 chars ideal), and CTA button. Always create 3 to 5 ad variations to A/B test."
]},
{name:"Canva (Ad Creatives)",icon:"🎨",cat:"Creative Design",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free / $13/mo",costType:"free",steps:[
  "Go to <strong>canva.com</strong>. For Facebook/Instagram Feed ads: <em>Create Design → Instagram Post</em> (1080x1080px square).",
  "For Stories and Reels ads: <em>Create Design → Instagram Story</em> (1080x1920px vertical). Always create both formats.",
  "High-converting ad creative formula: <strong>Hook visual</strong> (stops the scroll) + <strong>headline text overlay</strong> (3 to 5 words max) + <strong>brand logo</strong> bottom corner.",
  "Create a <strong>Brand Kit</strong> in Canva with client's exact colors, fonts, and logo. Every ad must be instantly recognizable as that brand.",
  "Use <strong>Canva's Magic Resize</strong> (Pro): design once, resize to all ad formats in seconds. Essential for agency efficiency.",
  "Create 5 to 7 creative variations per campaign. Different hooks, different visuals, same message. Let the algorithm find the winner."
]},
{name:"HubSpot CRM",icon:"🏢",cat:"Agency CRM",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>hubspot.com/crm</strong> and sign up free. HubSpot's free CRM is one of the most powerful free tools available.",
  "Go to <strong>Contacts → Create Contact</strong> for each prospect and client. Add: company, phone, email, deal size, and your notes from every call.",
  "Go to <strong>Sales → Deals → Create Deal</strong>. Create a pipeline stage for each step of your sales process: Lead → Discovery Call → Proposal Sent → Negotiation → Closed Won / Closed Lost.",
  "Set up <strong>Tasks</strong>: when a proposal is sent, create a task to follow up in 3 days. Drag deals through pipeline stages as they progress.",
  "Go to <strong>Marketing → Email</strong> to send professional email campaigns to your prospect list. Templates are available for agency use cases.",
  "Use <strong>Reports → Dashboard</strong> to track: number of active clients, monthly recurring revenue, and conversion rate from lead to client."
]}
],
  actions:["Choose one niche industry where you have some knowledge or interest","Study 20 businesses in that niche on social media and document their current performance","Send 10 personalized outreach messages per day to decision-makers in your chosen niche","Offer your first client a 30-day trial at a discounted rate to remove their risk of hiring you","After month 1, present clear results data and propose a full retainer at your standard rates"],
  videos:[{t:"How to Start a Social Media Marketing Agency 2024",q:"how to start social media marketing agency SMMA 2024",ch:"Search: Jordan Platten or Iman Gadzhi"}]
},
{id:29,tier:5,title:"SEO Agency and Consulting",tagline:"Help businesses rank on Google and charge premium monthly retainers for doing it",tag:"Agency",img:IMGS.laptop,
  stats:[{l:"Startup Cost",v:"₦160k to ₦80k0/mo"},{l:"Income Potential",v:"₦3M to ₦80M/mo"},{l:"First Income",v:"2 to 8 weeks"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Audit Client Site",s:"Technical and content"},{l:"Create SEO Strategy",s:"Keywords and content plan"},{l:"Implement and Build Links",s:"On-page and off-page"},{l:"Report Monthly Results",s:"Rankings and traffic growth"}],
  intro:"SEO is one of the most valuable services a business can invest in because the results compound over time. A website ranking number 1 for a high-intent keyword generates free traffic indefinitely, unlike paid ads which stop the moment you stop paying. SEO consultants and agencies charge $500 to $10,000 per month per client because the return on investment is so clear and measurable.",
  lessons:[
    {t:"The Complete SEO Service Stack",pts:["Technical SEO audit: analyze site speed, mobile optimization, crawlability, structured data, and Core Web Vitals. Tools like Screaming Frog identify hundreds of issues in minutes","Keyword research and content strategy: identify high-value keywords the client's competitors rank for but they do not. Build a 12-month content calendar targeting these opportunities","On-page optimization: optimize existing pages for target keywords. Meta titles, headers, internal links, content depth, and schema markup. Often the fastest way to show results in the first 30 to 60 days","Link building: reach out to relevant sites for guest posts, resource page inclusions, and editorial mentions. Backlinks remain the single most powerful ranking factor in Google's algorithm"]},
    {t:"Pricing and Positioning Your SEO Services",pts:["Never take a client whose website is too damaged to fix quickly. Your reputation is built on results and some sites require months of technical work before any content gains can show","Monthly retainer models work best for both parties: client gets consistent improvement, you get predictable income. Typical contracts are 6 to 12 months minimum given how long SEO takes to show results","ROI-based pricing: show the client how much traffic a competitor site in their industry generates and what that traffic would cost in paid ads. Then price your services as a fraction of that figure","Audit reports as a sales tool: a detailed SEO audit for $500 to $1,000 demonstrates your expertise and naturally leads into a full monthly retainer proposal"]}
  ],
  tools:[
{name:"Ahrefs",icon:"🔍",cat:"SEO Research",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"$99/mo",costType:"paid",steps:[
  "Go to <strong>ahrefs.com</strong> and start a trial. The most powerful SEO tool available — worth every dollar for agency work.",
  "Go to <strong>Site Explorer</strong>. Enter any competitor's domain to see: their top pages by traffic, all keywords they rank for, and all backlinks pointing to them.",
  "Go to <strong>Keywords Explorer</strong>. Enter a seed keyword. Filter by: KD (Keyword Difficulty) under 30, Volume over 500. These are your client's realistic opportunities.",
  "Go to <strong>Content Gap</strong> under Site Explorer. Enter your client's domain and 3 competitor domains. Ahrefs shows every keyword competitors rank for that your client does not.",
  "Go to <strong>Backlink Checker</strong>. Enter a competitor URL. Export their backlink list. Contact these same sites to get backlinks for your client (link building).",
  "Go to <strong>Rank Tracker → Add Campaign</strong>. Enter your client's domain and target keywords. Ahrefs emails a weekly report showing ranking movements automatically."
]},
{name:"Surfer SEO",icon:"🏄",cat:"Content Optimization",catColor:"rgba(0,229,255,0.12)",catTxt:"#00B8CC",cost:"$89/mo",costType:"paid",steps:[
  "Go to <strong>surferseo.com</strong>. Click <em>Content Editor → New Content Editor</em>. Enter your target keyword and country.",
  "Surfer analyzes the top 20 ranking pages and generates a content brief: recommended word count, headings to include, terms and their frequency, and structure.",
  "Open the editor and start writing (or paste existing content). The <strong>Content Score</strong> updates in real time — aim for 70+.",
  "Use <strong>Outline Builder</strong>: Surfer auto-generates H2 and H3 headings based on what top-ranking pages cover. Use these as your article structure.",
  "Run the <strong>Audit</strong> tool on existing client pages: paste any URL and Surfer shows exactly what terms to add and how many times to hit the target score.",
  "Connect to Google Search Console: Surfer identifies pages close to ranking and shows the minimum changes needed to push them into the top 10."
]},
{name:"Screaming Frog",icon:"🐸",cat:"Technical SEO",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free (500 URLs)",costType:"free",steps:[
  "Download <strong>Screaming Frog SEO Spider</strong> from screamingfrog.co.uk. Free version crawls up to 500 URLs.",
  "Open Screaming Frog. Enter your client's domain in the URL field and click <strong>Start</strong>. It crawls every page on the site.",
  "Go to <strong>Response Codes</strong> tab. Filter by 4XX to find all broken pages (404 errors). These need to be fixed or redirected.",
  "Go to <strong>Page Titles</strong> tab. Filter by <em>Missing</em> and <em>Duplicate</em>. Every page needs a unique, keyword-rich title tag under 60 characters.",
  "Go to <strong>Meta Description</strong> tab. Filter by <em>Missing</em>. Add meta descriptions to all flagged pages — these are the text snippets shown in Google results.",
  "Go to <strong>Images</strong> tab. Filter by <em>Missing Alt Text</em>. Images without alt text are invisible to Google — add descriptive, keyword-relevant alt text to each."
]}
],
  actions:["Complete an SEO audit of your own website or a sample site to practice your skills and create a portfolio piece","Learn one SEO area deeply: technical SEO, content optimization, or link building. Depth in one area is more valuable than surface knowledge of all three","Reach out to 10 small businesses with a free audit offer and a specific observation about a ranking opportunity they are missing","Set up your monthly reporting template before you sign your first client","Document every ranking improvement with before and after screenshots to build your case study library"],
  videos:[{t:"SEO Full Course for Beginners 2024",q:"SEO full course beginners 2024 free tutorial",ch:"Search: Ahrefs or Brian Dean Backlinko"}]
},
{id:30,tier:5,title:"Web Design and Development Business",tagline:"Build websites for businesses and charge $2,000 to $10,000 per project",tag:"Tech",img:IMGS.code,
  stats:[{l:"Startup Cost",v:"₦0 to ₦16k0/mo"},{l:"Income Potential",v:"₦5M to ₦80M/mo"},{l:"First Income",v:"1 to 4 weeks"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Build Your Portfolio",s:"3 to 5 sample sites"},{l:"Find Clients",s:"Outreach or referrals"},{l:"Deliver High-Quality Site",s:"On time and on budget"},{l:"Retainer for Maintenance",s:"Recurring monthly income"}],
  intro:"Web design and development remains one of the most in-demand freelance services because every business needs a website and most businesses already have one that is outdated, slow, or poorly converting. A skilled web designer can charge $2,000 to $10,000 per project and build a client base that generates $5,000 to $20,000 per month through a combination of project fees and recurring maintenance retainers.",
  lessons:[
    {t:"Building a Portfolio That Wins Projects",pts:["Build 3 to 5 high-quality concept or redesign projects before pitching any paying client. Pick real businesses with poor websites and redesign them. Show the before and after.","Specialize by industry if possible. A web designer specializing in restaurants, or medical practices, or law firms commands higher rates and wins easier because their portfolio speaks directly to each prospect's business","No-code tools like Webflow, Framer, and Squarespace allow you to build sophisticated sites in a fraction of the time of custom code. Framer in particular enables beautiful interactive sites with minimal technical overhead","Your portfolio site is your most important sales tool. It must be fast, beautiful, and demonstrate your design taste and technical capability before a prospect even contacts you"]},
    {t:"Pricing, Contracts, and Client Management",pts:["Never start a project without a signed contract and a 50% deposit. This protects both parties and filters out clients who are not serious","Break projects into defined phases: discovery and wireframes, design approval, development, and launch. Invoice at each milestone to maintain cash flow throughout the project","Maintenance retainers at $100 to $500 per month provide stable recurring income. Offer hosting management, plugin updates, content changes, and performance monitoring","Scope creep is the biggest threat to web design profitability. Define exactly what is included in the project price and charge for anything outside that scope. Firm but friendly boundaries protect your time and your relationship with the client"]}
  ],
  tools:[
{name:"Webflow",icon:"🌐",cat:"Web Design",catColor:"rgba(0,229,255,0.12)",catTxt:"#00B8CC",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>webflow.com</strong> and sign up free. Click <em>New Project → Start from a Template</em> or blank canvas.",
  "Webflow uses a visual CSS editor. Every element has a <strong>Style Panel</strong> on the right: set width, padding, margin, font, color, and background visually.",
  "To create a section: click <strong>+</strong> in the Navigator. Add a <em>Section</em> element, then <em>Container</em> inside it (max-width 1200px), then your content inside the container.",
  "Set up <strong>Responsive Breakpoints</strong>: click the tablet or phone icon at the top to switch to mobile view. Adjust styles for each breakpoint — changes only affect that screen size and smaller.",
  "Add interactions: select any element → <strong>Interactions panel</strong> → Add Interaction. Create scroll animations, hover effects, and page transitions without code.",
  "To publish: click <strong>Publish → Publish to webflow.io</strong> (free subdomain) or connect a custom domain under <strong>Project Settings → Hosting → Add Custom Domain</strong>."
]},
{name:"Figma",icon:"✏",cat:"Design & Prototyping",catColor:"rgba(123,110,255,0.12)",catTxt:"#7B6EFF",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>figma.com</strong> and sign up free. Click <em>New Design File</em>.",
  "Press <strong>F</strong> to create a Frame — choose a device preset (Desktop 1440px, Mobile 375px). This is your design canvas.",
  "Use the tools: <strong>R</strong> (rectangle), <strong>T</strong> (text), <strong>P</strong> (pen), <strong>I</strong> (image). Build your design layout.",
  "Create reusable <strong>Components</strong>: select an element → right-click → <em>Create Component</em>. Use it anywhere. When you edit the main component all instances update.",
  "Set up a <strong>Prototype</strong>: click the Prototype tab. Connect frames by dragging from a button to the next frame. Click Play to demo the clickable prototype to clients.",
  "Share with clients: click <strong>Share → Anyone with the link → Can View</strong>. Clients see the design and leave comments directly on the file."
]},
{name:"HoneyBook",icon:"📝",cat:"Client Management",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"$16/mo",costType:"paid",steps:[
  "Go to <strong>honeybook.com</strong> and start a free trial. HoneyBook handles contracts, invoices, and client communication in one place.",
  "Create a <strong>Project Template</strong>: set up a pipeline with stages — Inquiry → Discovery Call → Proposal Sent → Contract Signed → In Progress → Complete.",
  "Go to <strong>Templates → Proposals</strong>. Create your web design proposal template: services, timeline, deliverables, and pricing. Reuse for every new client.",
  "Create a <strong>Contract Template</strong>: include scope of work, payment terms, revision policy (max 2 rounds), and IP transfer clause. Get a lawyer to review once.",
  "Create an <strong>Invoice Template</strong>: 50% deposit upfront, 50% on completion. HoneyBook sends automatic payment reminders for unpaid invoices.",
  "Enable <strong>Automations</strong>: when a contract is signed → automatically send the welcome email and first invoice. Saves hours per client onboarding."
]}
],
  actions:["Build or redesign 3 websites to serve as your initial portfolio","Create your own portfolio site showcasing your work, services, and contact information","Identify 50 businesses with outdated or poor-performing websites in a niche you find interesting","Reach out with a specific observation about each business's current site and a before concept sketch","Set up a clear proposal template, contract, and invoice workflow before signing your first client"],
  videos:[{t:"Web Design Business: How to Get Clients and Scale",q:"web design business how to get clients scale 2024",ch:"Search: Gary Simon or DesignCourse"}]
},
{id:31,tier:5,title:"Video Editing Business",tagline:"Edit video for creators, brands, and businesses at $200 to $2,000 per video",tag:"Creative",img:IMGS.video,
  stats:[{l:"Startup Cost",v:"₦0 to ₦320k"},{l:"Income Potential",v:"₦3M to ₦32M/mo"},{l:"First Income",v:"1 to 3 weeks"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Learn Editing Software",s:"DaVinci or Premiere"},{l:"Build Portfolio",s:"Edit sample videos"},{l:"Find Creator Clients",s:"YouTube and social"},{l:"Retainer Agreements",s:"Monthly stable income"}],
  intro:"The explosion of YouTube, TikTok, podcasts, and corporate video content has created enormous, sustained demand for skilled video editors. YouTube creators with 100,000 or more subscribers routinely pay $500 to $2,000 per video and need editors consistently every week. Corporate clients pay even more for polished brand content. Video editing is a learnable skill with a clear path from beginner to $5,000 per month in under 6 months.",
  lessons:[
    {t:"Building Video Editing Skills That Clients Pay For",pts:["Learn DaVinci Resolve first: it is completely free, industry-standard, and more than capable for any commercial video editing work","Study the videos that perform best in your target niche and reverse engineer their editing style: pacing, color grade, text overlays, music choices, and transition frequency","Short-form editing (TikTok and Reels) is the fastest entry point: shorter videos, faster turnaround, and enormous demand from creators who post daily but cannot edit daily","Long-form editing for YouTube requires understanding narrative structure, viewer retention optimization, and color grading for different camera systems"]},
    {t:"Finding and Retaining Editing Clients",pts:["Target YouTube creators in the 10,000 to 100,000 subscriber range. They have budget, they post consistently, and they are not yet working with large agencies","Send a loom video as your outreach: record a 90-second video pointing out one specific edit they made that worked well and one thing you would improve. This immediately demonstrates your eye for editing","Retainer agreements: offer to edit 4 to 8 videos per month at a set monthly rate. Creators prefer this for budgeting predictability and editors prefer it for income stability","Build editing templates for each client: intro sequences, lower thirds, b-roll libraries, and color grade presets. These reduce your editing time per video significantly as the relationship matures"]}
  ],
  tools:[
{name:"DaVinci Resolve",icon:"🎬",cat:"Professional Editing",catColor:"rgba(123,110,255,0.12)",catTxt:"#7B6EFF",cost:"Free",costType:"free",steps:[
  "Download free from <strong>blackmagicdesign.com</strong>. Open and click <em>New Project</em>. Go to <strong>Project Settings</strong> and set timeline resolution to 1920x1080 (1080p).",
  "Import client footage: go to <strong>Media Pool → right-click → Import Media</strong>. Drag clips to the timeline on the <strong>Edit</strong> page.",
  "Use <strong>Blade Tool (B)</strong> to cut clips. Use <strong>Selection Tool (A)</strong> to move and delete. Delete gaps by right-clicking empty spaces → <em>Ripple Delete</em>.",
  "Add titles: go to <strong>Effects Library → Titles</strong>. Drag a title onto the timeline above your clips. Double-click to edit the text in the Inspector panel.",
  "Color grade on the <strong>Color</strong> page: use the Primaries wheels (Lift = shadows, Gamma = midtones, Gain = highlights). Apply a LUT for a quick cinematic look.",
  "Export: go to <strong>Deliver</strong> page. Choose <em>YouTube 1080p</em> preset. Click <em>Add to Render Queue → Render All</em>."
]},
{name:"Frame.io",icon:"🖼",cat:"Client Review",catColor:"rgba(0,229,255,0.12)",catTxt:"#00B8CC",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>frame.io</strong> and sign up free (free: 2GB storage). Click <em>New Project</em> and name it after the client.",
  "Upload your video export. Frame.io generates a review link automatically.",
  "Share the link with the client: <em>Here is your first edit for review: [link]</em>. They do not need a Frame.io account.",
  "Clients leave time-coded comments by clicking directly on the video at any moment. You see comments with exact timestamps like <em>0:24 — Change this text</em>.",
  "Check the <strong>Comments</strong> panel to see all feedback. Click any comment to jump to that exact moment in the video.",
  "When revisions are done upload the new version. Frame.io keeps version history so clients can compare V1 vs V2 side by side."
]},
{name:"Notion (Editing Pipeline)",icon:"📋",cat:"Project Management",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free",costType:"free",steps:[
  "Go to <strong>notion.so</strong>. Create a database called <strong>Video Projects</strong>.",
  "Add columns: Client Name, Project Title, Footage Received (date), First Cut Due, Revision 1 Due, Final Due, Status, Frame.io Link, Invoice Status.",
  "Create a <strong>Kanban View</strong> grouped by Status: Not Started → Editing → Client Review → Revisions → Final Delivery → Invoiced.",
  "Set <strong>Reminders</strong> on due date fields — Notion sends you a notification when a deadline is approaching.",
  "Create a client-facing <strong>shared page</strong> for each project: project timeline, revision guidelines (2 rounds max), file delivery format, and Frame.io review link.",
  "Track your editing rate: add a <strong>Hours Spent</strong> column. Divide invoice amount by hours to find your effective hourly rate and adjust pricing accordingly."
]}
],
  actions:["Install DaVinci Resolve and complete a free beginner course to learn the fundamentals","Edit 5 sample videos from public footage to build your initial reel","Identify 20 YouTube creators in a niche you follow who post at least once per week","Send personalized Loom video pitches to each creator showing your editing instincts","Aim for 3 retainer clients within 60 days and track your income and hours per client carefully"],
  videos:[{t:"Video Editing Business: From Zero to $5k/Month",q:"video editing business start from zero clients 2024",ch:"Search: Airrack or Video Influencers"}]
},
{id:32,tier:5,title:"Virtual Assistant Business",tagline:"Provide remote support to businesses and entrepreneurs at $25 to $75 per hour",tag:"Service",img:IMGS.people,
  stats:[{l:"Startup Cost",v:"₦0"},{l:"Income Potential",v:"₦2M to ₦24M/mo"},{l:"First Income",v:"1 to 7 days"},{l:"Difficulty",v:"Beginner"}],
  flow:[{l:"Define Your Services",s:"Admin, social, or tech VA"},{l:"Find Clients",s:"Upwork or outreach"},{l:"Deliver Consistently",s:"Reliability is everything"},{l:"Expand and Specialize",s:"Higher rates over time"}],
  intro:"Virtual assistants provide remote administrative, technical, or creative support to entrepreneurs, executives, and small businesses. The VA market is accessible to anyone with organizational skills, attention to detail, and reliable internet access. Starting rates are $15 to $25 per hour, but specialized VAs with specific skills command $50 to $150 per hour. The path to high income is specialization.",
  lessons:[
    {t:"High-Value VA Specializations That Command Premium Rates",pts:["Executive Assistant VA: calendar management, email filtering, travel booking, and meeting preparation for senior executives. $40 to $80 per hour","Social Media VA: content scheduling, hashtag research, DM management, and basic graphic creation. $25 to $50 per hour","Podcast VA: editing coordination, show notes writing, guest outreach, and episode scheduling. $30 to $60 per hour","E-commerce VA: product listing, order management, customer service tickets, and inventory tracking. High demand from Shopify and Amazon sellers"]},
    {t:"Building a Full Client Roster Within 30 Days",pts:["Start with Upwork or Fiverr to build your first 3 to 5 reviews. Yes, rates will be lower here initially, but the review system is your fastest path to credibility","After 3 successful projects, start direct outreach to entrepreneurs in your niche. Warm outreach through LinkedIn or Twitter converts at far higher rates than cold emails","Offer a 2-hour trial session at a reduced rate. Clients who try your work at low risk almost always convert to long-term arrangements if the quality is there","Your biggest competitive advantage as a VA is proactive communication. Clients do not want to chase you for updates. Regular progress messages and confirmation of task completion builds trust faster than any portfolio"]}
  ],
  tools:[
{name:"Notion (VA Operations)",icon:"📋",cat:"Organization",catColor:"rgba(123,110,255,0.12)",catTxt:"#7B6EFF",cost:"Free",costType:"free",steps:[
  "Go to <strong>notion.so</strong>. Create a <strong>Client Hub</strong> with one page per client. Inside each client page: their SOPs, login info (use LastPass for passwords), recurring tasks, and notes.",
  "Create a <strong>Daily Task Board</strong> as a Kanban database: Today, In Progress, Waiting on Client, Done. Move tasks across columns throughout your day.",
  "Create a <strong>Time Log</strong> database: Client, Task, Start Time, End Time, Duration, Billable. Fill this in for every task. This is your invoice source.",
  "Build an <strong>SOP Library</strong>: document every repeatable task as a step-by-step procedure. If you hire a subcontractor later, hand them the SOP and they're trained.",
  "Create an <strong>Onboarding Template</strong>: a checklist for every new client — access requests, communication preferences, working hours, and first deliverables.",
  "Share client-specific Notion pages with clients: they see their project status and can leave requests directly in their page."
]},
{name:"Google Workspace",icon:"📧",cat:"Communication",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"$6/mo",costType:"paid",steps:[
  "Go to <strong>workspace.google.com</strong> and sign up ($6/user/month). Get a professional email: <em>yourname@yourbusiness.com</em>.",
  "Use <strong>Gmail</strong> for client email. Set up email signatures with your name, title, and calendar booking link.",
  "Set up <strong>Google Drive folders</strong> per client: Client Name → Projects → [Project Name] → Deliverables / Working Files / Assets. Share the folder with the client.",
  "Use <strong>Google Calendar</strong> to block your working hours, schedule client check-in calls, and set task deadlines. Share your calendar availability via Calendly.",
  "Use <strong>Google Meet</strong> for video calls — it's free and requires no download for clients. Add it as the default meeting link in Calendly.",
  "Use <strong>Docs and Sheets</strong> for collaborative work with clients — they can see updates in real time and leave comments on specific sections."
]},
{name:"Loom (Async Updates)",icon:"🎥",cat:"Video Updates",catColor:"rgba(255,45,107,0.12)",catTxt:"#CC2255",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>loom.com</strong> and install the Chrome extension. Free plan: unlimited videos up to 5 minutes.",
  "Use Loom instead of long emails: record a 2-minute screen share showing exactly what you did and what you need from the client.",
  "For daily updates: <em>Click record → Screen + Camera → record a 60-second summary of today's work completed</em>. Send the link in Slack or email.",
  "For training: record your screen as you perform a task. Send the Loom link as documentation the client can rewatch anytime.",
  "Use Loom to ask questions: <em>I need clarification on X, Y, Z — here is a quick video explaining what I mean</em>. Faster than email chains.",
  "Check <strong>Loom Analytics</strong> to see if clients watched your videos. If they did not watch, follow up. If they did, they have the information."
]}
],
  actions:["List every professional skill you have that could help another business owner","Create a simple service menu with 3 to 5 VA packages at fixed hourly or monthly rates","Set up profiles on Upwork, Fiverr, and LinkedIn with a clear niche focus","Apply to 10 jobs per day on Upwork for the first 30 days","Transition at least 2 freelance clients to monthly retainers within 60 days of starting"],
  videos:[{t:"How to Start a Virtual Assistant Business 2024",q:"virtual assistant business start 2024 beginners guide",ch:"Search: Kayla Sloan or Horkey Handbook"}]
},
{id:33,tier:5,title:"Graphic Design Income Streams",tagline:"Turn visual skills into freelance income, digital products, and passive revenue",tag:"Creative",img:IMGS.design,
  stats:[{l:"Startup Cost",v:"₦0 to ₦8k0/mo"},{l:"Income Potential",v:"₦2M to ₦48M/mo"},{l:"First Income",v:"1 to 3 weeks"},{l:"Difficulty",v:"Beginner to Intermediate"}],
  flow:[{l:"Build Design Skills",s:"Canva or Adobe"},{l:"Choose Income Stream",s:"Freelance or products"},{l:"Build Portfolio",s:"Show your best work"},{l:"Scale and Diversify",s:"Multiple revenue sources"}],
  intro:"Graphic design skills can generate income through four distinct channels simultaneously: freelance client work, digital product sales, stock asset submissions, and print-on-demand products. A designer who understands business can combine all four streams to build income that is resilient, diversified, and scalable. The barrier to entry has never been lower with tools like Canva, but the ceiling has never been higher for those who develop genuine design expertise.",
  lessons:[
    {t:"The 4 Income Streams for Graphic Designers",pts:["Freelance client work: logos, brand identities, social media graphics, and marketing materials for businesses at $500 to $5,000 per project","Digital product sales: Canva templates, icon packs, font pairs, and brand kit templates sold on Creative Market, Etsy, or Gumroad for passive income","Stock submissions: original illustrations, vectors, and graphics submitted to Shutterstock, Adobe Stock, and iStock for royalty payments whenever your work is downloaded","Print-on-demand: original designs applied to apparel, stationery, and home goods sold through Printful or Redbubble without any inventory cost"]},
    {t:"Building a Portfolio That Gets Freelance Clients",pts:["Quality over quantity: 5 outstanding portfolio pieces beat 20 mediocre ones. Choose your absolute best work and present it with context: who was the client, what was the problem, what solution did you design","Behance and Dribbble are the primary platforms where clients find design talent. A strong Behance profile with 10 well-documented projects drives significant inbound inquiries","Pick a specialization: brand identity, packaging, social media graphics, or presentation design. Specialists earn 2 to 3 times more than generalists because clients perceive more relevant expertise","Show your design process, not just the final output. Clients want to see that you think strategically about design problems, not just produce aesthetically pleasing images"]}
  ],
  tools:[
{name:"Canva Pro",icon:"🎨",cat:"Design Tool",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"$13/mo",costType:"paid",steps:[
  "Go to <strong>canva.com</strong> and upgrade to Pro ($13/mo). Pro unlocks: Background Remover, Magic Resize, Brand Kits, 100M+ premium assets, and unlimited storage.",
  "Set up a <strong>Brand Kit</strong> for each client: go to Brand → Brand Kits → Add New. Upload their logo, enter hex color codes, and set their fonts.",
  "When designing for a client, go to <strong>Brand Kit</strong> panel and click their kit — all their colors and fonts are instantly available.",
  "Use <strong>Magic Resize</strong>: design a social post once, click Resize, select all the formats you need (Story, LinkedIn, Twitter Header). Canva resizes everything in seconds.",
  "Use <strong>Background Remover</strong>: upload any photo → Edit Image → Background Remover. Essential for product mockups and professional headshots.",
  "Create a <strong>Template Library</strong> for each client — save your designs as templates. This lets you (or your client) create new on-brand posts without starting from scratch."
]},
{name:"Figma",icon:"✏",cat:"Professional Design",catColor:"rgba(123,110,255,0.12)",catTxt:"#7B6EFF",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>figma.com</strong> and sign up free. Create a new file for each client project.",
  "Set up your <strong>design system</strong> first: create Color Styles (client brand colors), Text Styles (heading sizes, body text), and Component library (buttons, cards, icons).",
  "Use <strong>Auto Layout</strong>: select a group of elements → Shift+A. Auto Layout makes your designs responsive — elements resize and reflow automatically.",
  "Use <strong>Variants</strong> for components with states: create a Button component with variants — Default, Hover, Disabled, Loading. Switch between states in prototypes.",
  "Present to clients: click <strong>Present (Cmd+Option+Enter)</strong>. Your prototype runs in fullscreen. Clients click through the design as if it were a real product.",
  "Hand off to developers: click <strong>Inspect tab</strong>. Developers see exact CSS values, spacing, and can copy code directly. No back-and-forth needed."
]},
{name:"Creative Market",icon:"🛒",cat:"Asset Marketplace",catColor:"rgba(255,45,107,0.12)",catTxt:"#CC2255",cost:"Per asset",costType:"paid",steps:[
  "Go to <strong>creativemarket.com</strong>. Browse fonts, templates, mockups, and graphics. Everything is licensed for commercial use.",
  "Search for <em>mockup</em> to find device and product mockups. Buy once, use on multiple client projects.",
  "Buy a <strong>font bundle</strong> (often on sale) — having 50+ quality fonts gives you more design variety than competitors using only free fonts.",
  "Purchase <strong>icon sets</strong> and <strong>illustration packs</strong> in your niche. Consistent illustration styles elevate any brand identity project.",
  "Check the <strong>Free Goods section</strong> every Monday — Creative Market offers 6 free premium assets every week. Download everything even if you do not need it immediately.",
  "To sell on Creative Market: go to <strong>Become a Shop Owner → Apply</strong>. Upload your templates, mockups, or fonts and earn 70% commission per sale."
]}
],
  actions:["Complete 3 real or concept design projects to populate your initial portfolio","Create profiles on Behance and Dribbble with your best work","Choose one platform to list your digital design products: Creative Market or Etsy","Reach out to 10 small businesses in your area or online offering a free design review","Set a goal of publishing one new digital product per week for the next 12 weeks to build passive income"],
  videos:[{t:"How to Make Money with Graphic Design in 2024",q:"how to make money graphic design 2024 beginners",ch:"Search: Gareth David Studio or Pianu Design"}]
},
