{id:34,tier:6,title:"Stock Market and ETF Investing",tagline:"Make your money work as hard as you do while you build your business",tag:"Investing",img:IMGS.chart,
  stats:[{l:"Startup Cost",v:"₦80k to Start"},{l:"Average Annual Return",v:"8% to 12%"},{l:"Time Horizon",v:"5 to 30 years"},{l:"Risk Level",v:"Moderate"}],
  flow:[{l:"Earn Online Income",s:"From any other course"},{l:"Save and Invest",s:"Dollar-cost average"},{l:"Compound Returns",s:"Time does the work"},{l:"Financial Independence",s:"Money works for you"}],
  intro:"The stock market has returned an average of 10% annually over the last century. A $1,000 investment in an S&P 500 index fund in 2000 would be worth over $7,000 today with zero active management. This course is not about making you a day trader. It is about turning the income you build from your online business into lasting wealth through disciplined, consistent, long-term investing in proven assets.",
  lessons:[
    {t:"How the Stock Market Actually Works",pts:["When you buy a stock, you own a fractional piece of a real company. If the company grows more valuable, your share grows in value","An ETF (Exchange-Traded Fund) is a basket of stocks in one investment. The S&P 500 ETF (VOO or SPY) gives you exposure to the 500 largest US companies with one purchase","Dollar-Cost Averaging (DCA): invest a fixed amount weekly or monthly regardless of price. This removes emotion and ensures you automatically buy more when prices are low","The compound math: investing $500 per month at 10% annual return for 20 years grows to $343,000. Starting 10 years later with the same amount produces only $102,000. Time is the most powerful variable in investing"]},
    {t:"Building a Simple Wealth-Building Portfolio",pts:["Core holdings (80 to 90%): low-cost index ETFs. S&P 500 (VOO or SPY), Total Market (VTI), and international markets (VXUS). Hold these forever and add regularly","Satellite holdings (10 to 20%): individual stocks in companies you understand deeply and believe will continue growing for 10 or more years. Keep this percentage small and avoid frequent trading","Platforms accessible globally: Robinhood and Schwab for US residents, eToro for European and African investors, and Bamboo or Trove for Nigerian and other African market access","The most important investing rule: never invest money you need in the next 2 to 3 years. The market can decline 30 to 50% in any given year and requires a long horizon to recover and grow beyond those declines"]},
    {t:"Combining Business Income with Investing for Maximum Wealth",pts:["Set up automatic transfers of 20 to 30% of every online income payment directly to your investment account before you can spend it","Tax-advantaged accounts: in the US, max your Roth IRA ($7,000 per year) and SEP-IRA for self-employed individuals. These accounts grow tax-free","Reinvest dividends automatically. Over long periods, reinvested dividends account for a majority of total stock market returns","Business and investing together: at $5,000 per month business income, invest $1,500 per month (30%). Over 15 years at 10% growth, that builds to over $600,000 while your business income continues compounding separately"]}
  ],
  tools:[
{name:"Trading 212 / eToro",icon:"📈",cat:"Brokerage",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free",costType:"free",steps:[
  "For non-US: go to <strong>trading212.com</strong> or <strong>etoro.com</strong>. Both allow investing in US stocks and ETFs internationally with zero commission.",
  "Download the app. Complete identity verification (government ID + proof of address). Approval takes 1 to 3 days.",
  "Deposit funds via bank transfer or card. Start with whatever amount you can afford to leave untouched for 5+ years.",
  "Search for <strong>VOO</strong> (Vanguard S&P 500 ETF) or <strong>VTI</strong> (Total US Market ETF). These are your core holdings. Click Buy.",
  "Set up <strong>Auto-Invest</strong> or a recurring buy: on Trading 212 go to <em>Pies → Create Pie</em>. Add your ETFs, set percentages, and enable AutoInvest with a monthly amount.",
  "Never check your portfolio daily. Monthly review is sufficient. The goal is to add money consistently and let compound growth work over years."
]},
{name:"Yahoo Finance",icon:"📊",cat:"Research & Tracking",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free",costType:"free",steps:[
  "Go to <strong>finance.yahoo.com</strong> or download the Yahoo Finance app. Create a free account.",
  "Go to <strong>My Portfolio → Create Portfolio</strong>. Add your holdings (symbol, shares, purchase price). Yahoo tracks your portfolio value in real time.",
  "Follow companies in your portfolio: click a stock → <strong>Follow</strong>. News about that company now appears in your personalized feed.",
  "Go to any stock page → <strong>Financials</strong> to see income statement, balance sheet, and cash flow. Focus on: Revenue growth (year over year), Net Income trend, and Debt levels.",
  "Use the <strong>Screener</strong> to find new investment ideas: filter by sector, P/E ratio, market cap, and dividend yield.",
  "Set up <strong>Price Alerts</strong>: click any stock → Bell icon. Get notified when a stock hits your target buy price. This removes emotion from entry decisions."
]},
{name:"Personal Capital / Empower",icon:"💰",cat:"Net Worth Tracking",catColor:"rgba(123,110,255,0.12)",catTxt:"#7B6EFF",cost:"Free",costType:"free",steps:[
  "Go to <strong>empower.com</strong> (formerly Personal Capital) and sign up free. Connect all your financial accounts: bank, brokerage, retirement, and crypto.",
  "View your complete <strong>Net Worth Dashboard</strong>: all assets minus all liabilities in one number updated in real time.",
  "Go to <strong>Investment Checkup</strong>: Empower analyzes your portfolio allocation and compares it to the recommended allocation for your age and risk tolerance.",
  "Check <strong>Fee Analyzer</strong>: Empower scans your investment accounts for hidden fees. Even 1% annual fees cost you $100,000+ over a 30-year career.",
  "Use <strong>Retirement Planner</strong>: input your monthly savings and projected retirement age. The tool projects your wealth at retirement under different scenarios.",
  "Review your net worth monthly. Watching it grow is one of the most motivating things you can do to stay consistent with saving and investing."
]}
],
  actions:["Open a brokerage account with a platform accessible in your country","Fund your account with even $50 to start. The habit matters more than the initial amount","Buy your first share of a broad market ETF: VOO, SPY, or VTI","Set up an automatic monthly transfer from your business income to your investment account","Read 'The Psychology of Money' by Morgan Housel to understand the behavioral side of long-term investing"],
  videos:[{t:"Stock Market Investing for Beginners 2024",q:"stock market investing beginners 2024 ETF index fund",ch:"Search: Graham Stephan or Andrei Jikh"},
    {t:"ETF Investing: The Simple Portfolio Strategy",q:"ETF investing strategy beginners simple portfolio 2024",ch:"Search: Ben Felix or Two Cents PBS"}]
},
{id:35,tier:6,title:"Crypto Fundamentals and Strategy",tagline:"Understand digital assets intelligently and invest with a clear strategy",tag:"Investing",img:IMGS.crypto,
  stats:[{l:"Startup Cost",v:"₦80k to Start"},{l:"Potential Return",v:"High (and High Risk)"},{l:"Volatility",v:"Very High"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Understand Fundamentals",s:"Blockchain and use cases"},{l:"Choose Strategy",s:"Long-term or active"},{l:"Secure Your Assets",s:"Hardware wallet"},{l:"Manage Risk",s:"Never more than you can lose"}],
  intro:"Cryptocurrency represents a genuine technological and financial paradigm shift, but it is also one of the highest-risk asset classes available. This course teaches you to participate intelligently: understanding what you own, why it has value, how to secure it properly, and how to manage the extreme volatility without making decisions based on emotion or social media noise. The goal is not overnight wealth but informed, rational participation in an asset class that has produced extraordinary long-term returns alongside extraordinary losses for the unprepared.",
  lessons:[
    {t:"Blockchain and Cryptocurrency Fundamentals",pts:["A blockchain is a distributed database where records are verified by a network of computers rather than a central authority like a bank. This makes transactions permissionless and transparent","Bitcoin was created as digital hard money: a fixed supply of 21 million coins that cannot be inflated, seized from a wallet only you control, or transacted without your cryptographic signature","Ethereum introduced programmable contracts that run automatically without intermediaries, enabling DeFi (decentralized finance), NFTs, and token-based applications","Different cryptocurrencies serve different purposes. Bitcoin as a store of value, Ethereum as programmable infrastructure, stablecoins as dollar equivalents for trading, and thousands of speculative tokens of varying quality"]},
    {t:"Investment Strategy and Risk Management",pts:["Position sizing is everything in crypto. No single crypto position should represent more than 5 to 10% of your total portfolio given the volatility and permanent loss risk","Bitcoin and Ethereum represent 60 to 70% of the total crypto market cap. For most investors, owning only these two simplifies the decision-making and reduces risk from individual project failures","Hardware wallets (Ledger, Trezor) are non-negotiable for any meaningful crypto holdings. Exchanges have been hacked. Your keys on a hardware wallet cannot be accessed by anyone but you","Tax implications: in most jurisdictions, crypto is taxed as property. Every trade, sale, or use of crypto to purchase something is a taxable event. Keep meticulous records or use a tool like Koinly to track your cost basis"]}
  ],
  tools:[
{name:"Coinbase",icon:"₿",cat:"Exchange",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free (trading fees)",costType:"free",steps:[
  "Go to <strong>coinbase.com</strong> and create an account. Complete KYC verification (ID + selfie). Approval usually within 24 hours.",
  "Go to <strong>Add Payment Method</strong>. Connect your bank account for low-fee transfers or use a debit card for instant buys (higher fee).",
  "Click <strong>Buy</strong>. Search Bitcoin (BTC) or Ethereum (ETH). Enter your amount. Review the fee and confirm. Start small — $50 to understand the process.",
  "Enable <strong>Recurring Buy</strong>: click your asset → Buy → Recurring. Set weekly or monthly auto-purchases. Dollar-cost averaging removes the stress of timing the market.",
  "Go to <strong>Settings → Security → Enable 2-Step Verification</strong> with an authenticator app (not SMS). This is critical — SMS 2FA can be SIM-swapped.",
  "Never leave large amounts on an exchange long-term. Exchanges get hacked. Transfer significant holdings to a hardware wallet (Ledger)."
]},
{name:"Ledger (Hardware Wallet)",icon:"🔒",cat:"Cold Storage",catColor:"rgba(0,229,255,0.12)",catTxt:"#00B8CC",cost:"$79 one-time",costType:"paid",steps:[
  "Order a <strong>Ledger Nano X</strong> from <strong>ledger.com only</strong> — never buy from third-party sellers (risk of tampered devices).",
  "When it arrives, install <strong>Ledger Live</strong> on your computer. Connect your Ledger via USB and follow the setup: choose a PIN and write down your 24-word seed phrase.",
  "Write your 24-word seed phrase on paper. Store it in a safe location separate from your Ledger device. This phrase is the only way to recover your funds if the device is lost.",
  "In Ledger Live click <strong>Add Account</strong>. Select Bitcoin and Ethereum. Install the respective apps on your Ledger device.",
  "To receive crypto: click <strong>Receive</strong> in Ledger Live. Verify the address shown on your Ledger screen matches the app before sending any funds.",
  "Never share your seed phrase with anyone. No legitimate service, support team, or application will ever ask for it."
]},
{name:"Koinly (Tax Tracking)",icon:"📊",cat:"Crypto Tax",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>koinly.io</strong> and create a free account. Koinly supports 700+ exchanges and wallets.",
  "Click <strong>Add Wallet</strong>. Choose your exchange (Coinbase, Binance, etc). Connect via API key or import CSV transaction history.",
  "Add your wallet addresses (Ledger, MetaMask) in the <strong>Wallets</strong> section. Koinly automatically detects all transactions.",
  "Koinly calculates your <strong>cost basis</strong> for every transaction using FIFO, LIFO, or HMRC method depending on your country.",
  "Go to <strong>Tax Reports</strong>. Koinly generates a complete tax report for your jurisdiction. Free plan shows your gains — paid plan downloads the official report.",
  "Check your <strong>Unrealized Gains</strong> dashboard to see your current profit/loss position across all holdings in real time."
]}
],
  actions:["Complete a structured course on blockchain fundamentals before investing any money","Purchase a hardware wallet and learn how to use it securely before holding significant amounts","Start with Bitcoin only for your first 3 months. Master the basics of custody and volatility management before diversifying","Track every transaction for tax purposes from day one using Koinly or CoinTracker","Set clear rules for yourself: maximum portfolio allocation, sell triggers, and under what conditions you will add to positions versus hold"],
  videos:[{t:"Crypto for Beginners: Complete Guide 2024",q:"cryptocurrency beginners complete guide 2024 bitcoin ethereum",ch:"Search: Coin Bureau or Whiteboard Crypto"}]
},
{id:36,tier:6,title:"High Ticket Consulting and Coaching",tagline:"Get paid $1,000 to $25,000 to share expertise you already have",tag:"High Ticket",img:IMGS.people,
  stats:[{l:"Startup Cost",v:"₦0"},{l:"Income Potential",v:"₦8M to ₦160M/mo"},{l:"First Income",v:"1 to 4 weeks"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Package Expertise",s:"Specific outcome promise"},{l:"Build Credibility",s:"Content and case studies"},{l:"Book Discovery Calls",s:"Diagnose and propose"},{l:"Close and Deliver",s:"Transformation and results"}],
  intro:"If you have meaningful results or experience in any area, someone will pay a premium for a direct line to your expertise. High-ticket coaching and consulting is one of the most direct paths to $10,000 per month because each client generates $1,000 to $10,000 or more. You need only 2 to 3 clients to reach life-changing income, and the path to those clients is far shorter than most people believe.",
  lessons:[
    {t:"Packaging Your Expertise as a High-Ticket Offer",pts:["The shift from low-ticket to high-ticket: from 'I teach marketing' to 'I help e-commerce founders who have reached $10k per month scale to $100k per month in 6 months using paid ads and systems'","Specificity is the pricing mechanism. The more precisely you define who you help, what outcome they get, and in what timeframe, the higher you can charge and the easier it becomes to sell","Price anchoring: a 3-month program at $3,000 feels expensive until it is compared to the $30,000 per month in additional revenue the client is trying to generate. Always present your price alongside the outcome's value","Guarantee structures: offering a satisfaction guarantee or results-based guarantee removes risk from the buyer and signals confidence in your ability to deliver. Use them whenever possible"]},
    {t:"Getting Clients Without a Large Audience",pts:["Warm network first: identify 20 people who could benefit from your expertise or who know people who could. Reach out personally, not with a sales pitch, but with genuine curiosity about their challenges","Discovery calls: invite potential clients to a free 45-minute clarity call where you diagnose their situation and present a tailored proposal. This is not a pitch, it is a consultation. Well-run discovery calls convert at 20 to 40%","LinkedIn personal brand: post consistently about the transformations you create and the specific results you have produced. Decision-makers are reading LinkedIn and they reach out when they recognize their own challenge in your content","Referrals: ask every satisfied client for one specific introduction. 'Do you know one other person who faces the challenge we worked on together?' Referral clients close faster and at higher rates than any cold acquisition channel"]}
  ],
  tools:[
{name:"Calendly",icon:"📅",cat:"Booking",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>calendly.com</strong> and sign up free. Connect your Google Calendar or Outlook.",
  "Click <strong>+ New Event Type → One-on-One</strong>. Name it: <em>Free 30-Min Strategy Session</em>. Set duration to 30 minutes.",
  "Under <strong>Questions</strong> add qualifying fields: <em>What is your biggest challenge right now?</em>, <em>What is your monthly revenue?</em>, <em>What have you already tried?</em>. This filters serious prospects only.",
  "Under <strong>Notifications</strong> enable email reminders at 24 hours and 1 hour before the call. This cuts no-shows by 60%.",
  "Add your Calendly link to your LinkedIn bio, email signature, and at the end of every content piece: <em>Book a free strategy call here.</em>",
  "After every call send a follow-up email within 2 hours with a summary of what you discussed and your proposal or next step. Speed here directly impacts conversion rate."
]},
{name:"Notion (Client Delivery)",icon:"📋",cat:"Client Portal",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free",costType:"free",steps:[
  "Go to <strong>notion.so</strong>. Create a <strong>Client Portal Template</strong> — duplicate this for every new client.",
  "Inside each client portal include: Welcome message, Program Overview, Weekly Call Schedule, Resource Library, Action Items (updated weekly), and Progress Tracking.",
  "Create a <strong>Consulting Delivery Database</strong>: columns for Client Name, Start Date, End Date, Monthly Retainer, Sessions Completed, Next Session Date, Status.",
  "After every consulting call update the client portal with: session summary, key decisions made, action items for the client, and your recommendations.",
  "Share the portal: <strong>Share → Anyone with link → Can View</strong>. Clients can access their portal anytime to review materials and track progress.",
  "Use Notion to build your <strong>Consulting Methodology</strong>: document your framework, templates, and processes. This is your intellectual property and justifies your premium price."
]},
{name:"Loom (Async Consulting)",icon:"🎥",cat:"Video Delivery",catColor:"rgba(255,45,107,0.12)",catTxt:"#CC2255",cost:"Free tier",costType:"free",steps:[

  intro:"A strong personal brand is the multiplier that makes every other income stream in this program generate more. When people know, like, and trust you before you even speak to them, sales become conversations. Opportunities find you. Your content travels further. A personal brand is not vanity. It is business infrastructure that takes time to build but pays dividends indefinitely once established.",
  lessons:[
    {t:"Building Your Brand DNA: The 3-Part Foundation",pts:["Point of View: what do you believe that others in your space do not? Conviction is magnetic. Safe, middle-of-the-road opinions attract no one","Story: what is the journey that makes your perspective credible and relatable? Your transformation story is your most powerful brand asset","Expertise: what specific result can you consistently help people achieve? The more concrete and measurable, the stronger the positioning","The most powerful brands are intentionally polarizing: they attract a passionate audience by taking a clear stand. 'Productivity advice is mostly broken. Here is what actually works for entrepreneurs.' outperforms 'Here are 5 tips to be more productive' every single time"]},
    {t:"Content Strategy for Building Thought Leadership",pts:["Publish consistently on one platform for 90 days before expanding. Depth builds algorithm momentum and audience trust faster than spreading thin across many platforms","Content mix: 60% educational and value-adding, 20% personal story and vulnerability, 10% engagement and conversation-starting, 10% direct offers","Document your journey in real time. Building in public: sharing your actual results, failures, and pivots generates far more authentic content than polished advice and builds a community around your progress","Repurpose everything: one long-form piece, whether a video, article, or podcast episode, should produce 10 or more short-form pieces across platforms"]},
    {t:"Leveraging Your Brand for Multiple Income Streams",pts:["Every income stream in this program performs better with an established personal brand behind it. Affiliate recommendations convert at higher rates, consulting clients pay more, courses sell faster, and brand deals find you rather than you finding them","Speaking opportunities: a recognizable personal brand in your niche can command $1,000 to $20,000 per speaking engagement at conferences, corporate events, and online summits","Book deal or self-published book: a book is the ultimate credibility asset. It opens doors to media, corporate speaking, and high-ticket consulting that no other content format matches","Partnership and collaboration income: brands, tools, and organizations in your niche will pay for access to your audience once you have established genuine authority in the space"]}

{id:39,tier:7,title:"Sales Funnels and Conversion Optimization",tagline:"The system that turns traffic into buyers automatically while you sleep",tag:"Growth",img:IMGS.laptop,
  stats:[{l:"Startup Cost",v:"₦0 to ₦14k7/mo"},{l:"Income Potential",v:"Multiplies existing traffic 3x to 10x"},{l:"Build Time",v:"2 to 6 weeks"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Traffic Source",s:"Ads, SEO, or Social"},{l:"Lead Magnet Page",s:"Free resource opt-in"},{l:"Tripwire Offer",s:"$7 to $47 low ticket"},{l:"Core Offer",s:"$97 to $997 main product"},{l:"Upsell",s:"$997 to $5,000+ backend"}],
  intro:"A sales funnel is a structured sequence that takes a prospect from awareness to purchase automatically. Building an effective funnel is the closest thing to printing money in online business because once a funnel converts profitably, adding more traffic simply multiplies the output. The funnel is the business engine. Every other course in this program feeds traffic into it.",
  lessons:[
    {t:"The Anatomy of a High-Converting Sales Funnel",pts:["Lead magnet page: the entry point. Trade a high-value free resource for an email address. Conversion rate benchmark: 30 to 50% for a well-targeted, relevant offer","Tripwire: immediately after someone opts in, offer a low-cost product at $7 to $47. This qualifies buyers from browsers and converts at 5 to 15%. Those who buy once are 10 times more likely to buy again","Core offer: your primary product at $97 to $997. Now presented to a warmed-up audience who already opted in and may have purchased the tripwire. Core offer conversion: 2 to 8%","Upsell and backend: after the core offer, present a higher-ticket option at $997 to $5,000 or more. Even a 3% conversion here can represent the majority of your total funnel revenue"]},
    {t:"Funnel Optimization: How to Double Conversion Rates",pts:["Test your headline first. This single element can change page conversion rate by 50 to 300%. Run 2 variants, keep the winner, then move to the next element","Heatmap tools like Hotjar and Microsoft Clarity show exactly where visitors scroll, click, and drop off. This real data is worth more than any conversion theory","Adding video to a landing page typically increases conversion by 40 to 80%. Even a simple 90-second talking-head video explaining the offer beats text alone every time","Speed is a conversion factor: a page loading in 1 second converts 3 times better than a page loading in 5 seconds. Use a fast host and compress all images before publishing"]},
    {t:"Traffic Sources and Funnel Economics",pts:["Paid ads (Meta and Google) allow you to control traffic volume precisely once you find a profitable funnel. If you spend $1 and make $3, you simply spend more","Calculate your funnel's economics: if average cart value is $85 and you spend $20 per lead, you need 1 in 5 leads to purchase for the funnel to break even. Improve either the ad cost or the conversion rate to grow profitably","Email traffic: your list is your most efficient traffic source for promotions. A campaign to a warm email list will consistently outperform cold ad traffic by 5 to 10 times on conversion rate","SEO content traffic: blog posts ranking in Google send pre-educated visitors into your funnel. This traffic has already self-selected as interested, making it the highest-quality source for long-term funnel performance"]}
  ],
  tools:[
{name:"Systeme.io",icon:"🔄",cat:"Funnel Builder",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free",costType:"free",steps:[
  "Go to <strong>systeme.io</strong> and sign up free. Free plan includes unlimited funnels, 2,000 contacts, and email campaigns.",
  "Click <strong>Funnels → Create → Sales Funnel</strong>. Choose a template. Your funnel has 3 pages: Sales Page, Order Form, Thank You Page.",
  "Edit the <strong>Sales Page</strong>: click any element to edit. Replace the headline with your outcome statement. Replace body text with your copy. Add testimonials and your product image.",
  "Edit the <strong>Order Form</strong>: go to Settings → connect your Stripe or PayPal. Set your product price. Add an order bump (a small add-on offer) to increase average order value.",
  "Edit the <strong>Thank You Page</strong>: deliver your product here (download link or redirect to course). Add an upsell offer for a higher-ticket product.",
  "Go to <strong>Emails → Campaigns</strong>. Create a post-purchase follow-up sequence: Day 1 delivery confirmation, Day 3 check-in, Day 7 tip related to the product, Day 14 case study or testimonial request."
]},
{name:"Hotjar",icon:"🔥",cat:"Conversion Analytics",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>hotjar.com</strong> and sign up free (free: 35 sessions/day). Add the tracking script to your sales page inside the <code>&lt;head&gt;</code> tag.",
  "Go to <strong>Heatmaps → Create Heatmap</strong>. Set it to record your sales page. Heatmaps show where visitors click, move, and scroll.",
  "Check your <strong>Scroll Map</strong>: the red/orange zone shows where 80% of visitors stop scrolling. Everything below that point needs to be moved higher on the page.",
  "Go to <strong>Recordings → View Recordings</strong>. Watch real visitors navigate your page. Notice exactly where they hesitate, scroll back, or leave.",
  "Go to <strong>Feedback → Polls</strong>. Add an exit poll: <em>What stopped you from completing your purchase today?</em> Real answers tell you what to fix.",
  "Test one change at a time. Move your CTA button up, change your headline, or add a testimonial. Give it 100 visitors before judging the impact."
]},
{name:"Google Analytics 4",icon:"📊",cat:"Traffic Analytics",catColor:"rgba(123,110,255,0.12)",catTxt:"#7B6EFF",cost:"Free",costType:"free",steps:[
  "Go to <strong>analytics.google.com</strong> and create a free account. Click <em>Create Property</em>. Enter your website URL.",
  "Copy the <strong>G-tag</strong> (Global Site Tag) and paste it inside the <code>&lt;head&gt;</code> tag of your funnel page. Google Analytics begins tracking immediately.",
  "Go to <strong>Reports → Acquisition → Traffic Acquisition</strong>. See exactly where your visitors come from: organic search, social media, email, or direct.",
  "Set up <strong>Conversions</strong>: go to Admin → Events → Mark as Conversion. Mark your Thank You Page visit as a conversion so GA tracks your conversion rate.",
  "Go to <strong>Explore → Funnel Exploration</strong>. Define your funnel steps: Landing Page → Order Form → Thank You. See exactly where people drop off.",
  "Check <strong>Audience → Demographics</strong> to understand who is visiting. Match your ad targeting and copy to your actual audience demographics."
]}
],
  actions:["Map your current customer journey from first awareness to purchase and identify where people drop off","Build a simple 3-page funnel: lead magnet page, thank you page, and one-time-offer page","Set up tracking for every key action: opt-in, purchase, upsell acceptance, and email open rates","Drive 100 test visitors to your funnel before making any optimization decisions","Split-test your headline for 2 weeks before moving on to test other funnel elements"],

  flow:[{l:"Hustler Stage",s:"You do everything"},{l:"Builder Stage",s:"Systems and first hires"},{l:"Scaler Stage",s:"Team and delegation"},{l:"Empire Stage",s:"Vision and ownership"}],
  intro:"The final course is about the most important transition any entrepreneur makes: from being self-employed, where you ARE the business, to being a business owner, where you OWN the business. This shift requires intentional systems, the right team, and a clear vision of what you are building and why. The path from your first $1 online to a 7-figure empire is documented here in full. What happens next is entirely up to you.",
  lessons:[
    {t:"The 4 Business Stages and How to Move Through Each One",pts:["Stage 1 - Hustler ($0 to $5k/month): you do everything. Focus is on finding what works, getting first clients and sales, and mastering your core offer. Speed and learning matter more than optimization","Stage 2 - Builder ($5k to $25k/month): you have validated your model. Systematize what is working. Document every process. Hire your first contractor. Automate what AI and tools can handle. Protect your time intensively","Stage 3 - Scaler ($25k to $100k/month): you have systems and a small team. Focus on increasing average transaction value, improving retention, expanding traffic channels, and hiring people who are better than you at specific things","Stage 4 - Empire Builder ($100k+ per month): you work on vision, culture, strategic partnerships, and legacy. Multiple income streams operate with minimal personal involvement. You are building something that exists beyond you"]},
    {t:"The 6 Systems Every Serious Business Must Build",pts:["Lead Generation System: a documented, repeatable process for consistently bringing new prospects into your world. Not relying on luck, virality, or any single platform","Sales System: a proven, documented process to convert leads to customers whether through a funnel, discovery call sequence, or e-commerce checkout flow","Delivery System: a repeatable way to deliver your product or service at consistent quality regardless of whether you are personally involved in every transaction","Finance System: monthly profit and loss tracking, automatic tax savings, reinvestment ratios, and payment processing that does not require your daily attention or intervention","Team and Hiring System: clear job descriptions, onboarding processes, performance metrics, and communication norms that allow your team to operate independently and make good decisions","Feedback and Iteration System: regular customer surveys, analytics reviews, and team retrospectives that continuously improve every other system in the business"]},
    {t:"Mindset and Psychology for Long-Term Success",pts:["The single biggest predictor of business success is not intelligence or capital or connections. It is the willingness to take action before feeling fully ready and to continue after the first inevitable failure","Revenue is vanity. Profit is sanity. Cash flow is reality. Always know your unit economics, margins, and monthly operating costs before making any growth investment","Build your health, relationships, and inner life alongside your business. A profitable company built at the cost of your physical health and personal relationships is not success","Your business is the means, not the end. Continuously clarify what financial freedom actually looks like for you, and make sure the business you are building actually delivers it"]}

function render(){
  try {
    var h = location.hash.replace('#','');
    if(h.startsWith('course-')){
      var id = parseInt(h.split('-')[1]);
      if(id>=1&&id<=40){ renderCourse(id); }

function switchTab(name){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  var tabs = document.querySelectorAll('.tab');
  var map = {overview:0,lessons:1,videos:2,resources:3};
  if(tabs[map[name]]) tabs[map[name]].classList.add('active');
}

// ── VIDEO PLAYER ───────────────────────────────────────
function openVideoPlayer(videoId, title){
  var modal = document.getElementById('videoModal');
  var frame = document.getElementById('videoModalFrame');
  var titleEl = document.getElementById('videoModalTitle');
  titleEl.textContent = title;
  // Use youtube-nocookie for better compatibility. Add onerror fallback.
  frame.innerHTML = `
    <iframe
      id="yt-iframe"
      src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
      onload="checkIframeError(this,'${videoId}','${title.replace(/'/g,"\\'")}')"
    ></iframe>
    <div id="yt-fallback" style="display:none;position:absolute;inset:0;background:#111;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:32px;text-align:center;">
      <div style="font-size:40px;">▶</div>
      <p style="color:#fff;font-size:15px;font-weight:600;">${title}</p>
      <p style="color:rgba(255,255,255,0.6);font-size:13px;">This video can't be embedded but you can watch it directly on YouTube.</p>
      <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank"
        style="background:var(--gold);color:#fff;font-weight:700;font-size:14px;padding:13px 28px;border-radius:8px;text-decoration:none;display:inline-block;">
        ▶ Watch on YouTube
      </a>
    </div>`;
  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  // Fallback timer — if iframe doesn't load properly in 4 seconds show the button
  window._ytTimer = setTimeout(()=>showYtFallback(), 4000);
}

function checkIframeError(iframe, videoId, title){
  // Try to detect blocked embed via postMessage errors — clear the timer if it loaded fine
  clearTimeout(window._ytTimer);
  // If the iframe loaded but shows error page, YouTube sends a specific message
  // We listen for it below. If no error, keep playing.
}

function showYtFallback(){
  var iframe = document.getElementById('yt-iframe');
  var fallback = document.getElementById('yt-fallback');
  if(iframe) iframe.style.display = 'none';
  if(fallback){ fallback.style.display = 'flex'; }
}

// Listen for YouTube embed errors via postMessage
window.addEventListener('message', function(e){
  if(e.data && typeof e.data === 'object' && e.data.event === 'infoDelivery'){
    if(e.data.info && e.data.info.errorCode){
      clearTimeout(window._ytTimer);
      showYtFallback();
    }
  }
  // Some YouTube errors come as strings
  if(typeof e.data === 'string' && e.data.includes('{"event":"ERROR"')){
    clearTimeout(window._ytTimer);
    showYtFallback();
  }
});

function openSearchPlayer(query, title){
  var modal = document.getElementById('videoModal');
  var frame = document.getElementById('videoModalFrame');
  var titleEl = document.getElementById('videoModalTitle');
  titleEl.textContent = title;
  frame.innerHTML = `<div class="video-search-body">
    <p>This is a curated search topic. Tap below to find the best current video on YouTube.</p>
    <a class="video-search-link" href="https://www.youtube.com/results?search_query=${query}" target="_blank">🔍 Find on YouTube →</a>
  </div>`;
  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeVideoPlayer(){
  clearTimeout(window._ytTimer);
  var modal = document.getElementById('videoModal');
  var frame = document.getElementById('videoModalFrame');
  modal.classList.add('hidden');
  frame.innerHTML = '';
  document.body.style.overflow = '';
}

document.addEventListener('click', function(e){
  var modal = document.getElementById('videoModal');
  if(e.target === modal) closeVideoPlayer();
});
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeVideoPlayer();
});

  var c = courses.find(x=>x.id===id);
  if(!c){alert('Module not found.');return;}

  var accentMap = {1:'#D4A017',2:'#C0392B',3:'#1A7A4A',4:'#4A3F9E',5:'#B85C1A',6:'#0A6E7A',7:'#C0392B'};
  var accent = accentMap[c.tier] || '#D4A017';
  var tierNames = {1:'Fastest to Income',2:'Digital Products',3:'Content & Audience',4:'Freelance & Services',5:'Platforms & Marketplaces',6:'Advanced & Passive',7:'Wealth & Mindset'};

  // COVER PAGE
  var statsRows = (c.stats||[]).map(s=>`
    <tr>
      <td style="padding:14px 20px;border-bottom:1px solid #e8e8e8;font-size:14px;color:#555;font-weight:500;">${s.l}</td>
      <td style="padding:14px 20px;border-bottom:1px solid #e8e8e8;font-size:15px;color:#111;font-weight:700;text-align:right;">${s.v}</td>
    </tr>`).join('');

  // OVERVIEW PAGE
  var overviewPage = `
    <div class="page">
      <div class="page-header">
        <span class="page-label">Overview</span>
        <span class="page-module">Module ${String(c.id).padStart(2,'0')} of 40</span>
      </div>
      <h2 style="font-size:26px;font-weight:800;color:#111;margin-bottom:6px;line-height:1.2;">${c.title}</h2>
      <p style="font-size:15px;color:#888;margin-bottom:32px;font-style:italic;">${c.tagline}</p>
      <div class="section-label">What This Module Covers</div>
      <p style="font-size:17px;color:#222;line-height:1.9;margin-bottom:0;">${c.intro}</p>
      ${statsRows ? `
        <div class="section-label" style="margin-top:36px;">At a Glance</div>
        <table style="width:100%;border-collapse:collapse;border:1px solid #e8e8e8;border-radius:8px;overflow:hidden;">
          ${statsRows}
        </table>` : ''}
    </div>`;

  // ONE PAGE PER LESSON
  var lessonPages = c.lessons.map((l,i)=>`
    <div class="page">
      <div class="page-header">
        <span class="page-label">Lesson ${i+1} of ${c.lessons.length}</span>
        <span class="page-module">Module ${String(c.id).padStart(2,'0')} — ${c.title}</span>
      </div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">
        <div style="width:52px;height:52px;background:${accent};border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-size:20px;font-weight:900;color:#fff;">${i+1}</span>
        </div>
        <h2 style="font-size:22px;font-weight:800;color:#111;line-height:1.25;">${l.t}</h2>
      </div>
      ${l.text ? `<p style="font-size:16px;color:#333;line-height:1.9;margin-bottom:28px;padding:20px 24px;background:#f7f7f7;border-radius:8px;">${l.text}</p>` : ''}
      ${l.pts && l.pts.length ? `
        <div class="section-label">Key Points</div>
        <ul style="list-style:none;padding:0;margin:0;">
          ${l.pts.map(p=>`
            <li style="display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid #f0f0f0;">
              <span style="width:8px;height:8px;background:${accent};border-radius:50%;flex-shrink:0;margin-top:8px;"></span>
              <span style="font-size:16px;color:#222;line-height:1.75;">${p}</span>
            </li>`).join('')}
        </ul>` : ''}
    </div>`).join('');

  // ACTION PLAN PAGE
  var actionPage = (c.actions||[]).length ? `
    <div class="page">
      <div class="page-header">
        <span class="page-label">Action Plan</span>
        <span class="page-module">Module ${String(c.id).padStart(2,'0')} — ${c.title}</span>
      </div>
      <h2 style="font-size:26px;font-weight:800;color:#111;margin-bottom:8px;">Your Next Steps</h2>
      <p style="font-size:16px;color:#888;margin-bottom:32px;">Complete these actions to implement what you've learned in this module.</p>
      <ol style="padding:0;margin:0;list-style:none;">
        ${(c.actions||[]).map((a,i)=>`
          <li style="display:flex;gap:20px;align-items:flex-start;padding:18px 0;border-bottom:1px solid #f0f0f0;">
            <span style="width:34px;height:34px;background:${accent};border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;font-weight:800;color:#fff;">${i+1}</span>
            <span style="font-size:16px;color:#222;line-height:1.75;padding-top:5px;">${a}</span>
          </li>`).join('')}
      </ol>
    </div>` : '';

  var fullHTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Module ${c.id} — ${c.title} | 6-Figure Digital Playbook</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html{font-size:16px;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    background:#f0f0f0;
    color:#111;
  }

  /* ── PRINT BUTTON ── */
  .save-bar{
    position:fixed;top:0;left:0;right:0;z-index:999;
    background:#fff;border-bottom:1px solid #e0e0e0;
    padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  .save-bar-title{font-size:15px;font-weight:700;color:#111;}
  .save-bar-sub{font-size:12px;color:#888;margin-top:2px;}
  .save-btn{
    background:${accent};color:#fff;font-weight:700;font-size:15px;
    padding:12px 28px;border:none;border-radius:8px;cursor:pointer;
    white-space:nowrap;
  }
  body{padding-top:72px;}

  /* ── PAGES ── */
  .page{
    background:#fff;
    max-width:720px;
    margin:24px auto;
    padding:48px 52px;
    border-radius:8px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
    min-height:auto;
  }
  .cover-page{
    background:#111;
    max-width:720px;
    margin:24px auto;
    padding:64px 52px;
    border-radius:8px;
    min-height:500px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  /* ── HEADER STRIP ── */
  .page-header{
    display:flex;justify-content:space-between;align-items:center;
    padding-bottom:16px;margin-bottom:28px;
    border-bottom:2px solid ${accent};
  }
  .page-label{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:${accent};}
  .page-module{font-size:12px;color:#aaa;}

  /* ── SECTION LABEL ── */
  .section-label{
    font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    color:#999;margin-bottom:14px;
  }

  /* ── PRINT ── */
  @media print{
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
    body{background:#fff;padding-top:0;}
    .save-bar{display:none!important;}
    .page, .cover-page{
      margin:0!important;
      border-radius:0!important;
      box-shadow:none!important;
      padding:40px 48px!important;
      page-break-after:always;
      min-height:100vh;
      max-width:100%!important;
    }
    .cover-page{min-height:100vh;display:flex;flex-direction:column;justify-content:center;}
  }
</style>
</head>
<body>

<!-- SAVE BAR -->
<div class="save-bar">
  <div>
    <div class="save-bar-title">Module ${String(c.id).padStart(2,'0')} — ${c.title}</div>
    <div class="save-bar-sub">Tap the button → then choose "Save as PDF" in your print menu</div>
  </div>
  <button class="save-btn" onclick="window.print()">⬇ Save as PDF</button>
</div>

<!-- COVER PAGE -->
<div class="cover-page">
  <div style="font-size:11px;letter-spacing:3px;color:${accent};text-transform:uppercase;margin-bottom:16px;font-weight:700;">The 6-Figure Digital Playbook &nbsp;·&nbsp; Tier ${c.tier}: ${(tierNames[c.tier]||'')}</div>
  <div style="font-size:13px;color:#555;margin-bottom:12px;font-weight:500;">MODULE ${String(c.id).padStart(2,'0')} OF 40</div>
  <h1 style="font-size:42px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:16px;letter-spacing:-1px;">${c.title}</h1>
  <p style="font-size:18px;color:#aaa;line-height:1.6;max-width:500px;margin-bottom:48px;">${c.tagline}</p>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <span style="background:rgba(255,255,255,0.08);color:#ccc;font-size:13px;padding:8px 16px;border-radius:20px;">${c.lessons.length} Lessons</span>
    ${(c.actions||[]).length ? `<span style="background:rgba(255,255,255,0.08);color:#ccc;font-size:13px;padding:8px 16px;border-radius:20px;">${(c.actions||[]).length} Action Steps</span>` : ''}
    <span style="background:${accent};color:#fff;font-size:13px;padding:8px 16px;border-radius:20px;font-weight:700;">Tier ${c.tier}</span>
  </div>
</div>

<!-- OVERVIEW PAGE -->
${overviewPage}

<!-- LESSON PAGES -->
${lessonPages}

<!-- ACTION PLAN -->
${actionPage}

</body>
</html>`;

  var existing = document.getElementById('pdf-overlay');
  if(existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.id = 'pdf-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#f0f0f0;overflow:auto;-webkit-overflow-scrolling:touch;';

  var iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none;';
  overlay.appendChild(iframe);

  var closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ Close';
  closeBtn.style.cssText = 'position:fixed;top:16px;left:16px;background:#111;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;z-index:100001;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-family:inherit;';
  closeBtn.onclick = ()=>{ overlay.remove(); document.body.style.overflow=''; };
  overlay.appendChild(closeBtn);

  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';

  var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
  iframeDoc.open();
  iframeDoc.write(fullHTML);
  iframeDoc.close();
}
</script>
</body>
</html>
