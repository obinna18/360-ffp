<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 6-Figure Digital Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ──────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F7F8FA;
  --surface:#FFFFFF;
  --card:#FFFFFF;
  --border:#E8EAED;
  --border2:#F0F2F5;
  --txt:#111318;
  --txt2:#444950;
  --muted:#8A909A;
  --gold:#F5A623;
  --gold-light:#FFF8EC;
  --gold-border:#FFE5A0;
  --green:#22C55E;
  --green-light:#F0FDF4;
  --rose:#EF4444;
  --purple:#7C3AED;
  --cyan:#0EA5E9;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.10);
  --radius:12px;
  --radius-sm:8px;
  --t1:#F5A623;--t2:#EF4444;--t3:#22C55E;--t4:#7C3AED;--t5:#F97316;--t6:#0EA5E9;--t7:#EF4444;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:10px;}

/* ── NAV ──────────────────────────────────────────────── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--shadow-sm);
}
.nav-logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--txt);cursor:pointer;letter-spacing:-0.3px;}
.nav-logo span{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-link{font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;padding:6px 12px;border-radius:var(--radius-sm);transition:all .15s;}
.nav-link:hover{background:var(--bg);color:var(--txt);}
.nav-prog{font-size:12px;font-weight:700;color:var(--gold);padding:5px 14px;background:var(--gold-light);border:1px solid var(--gold-border);border-radius:20px;}
.theme-btn{background:none;border:1px solid var(--border);width:34px;height:34px;border-radius:var(--radius-sm);cursor:pointer;font-size:15px;color:var(--txt2);display:flex;align-items:center;justify-content:center;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--txt);border-radius:2px;}
.mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;z-index:99;flex-direction:column;gap:2px;box-shadow:var(--shadow);}
.mobile-menu.open{display:flex;}
.mobile-link{font-size:14px;padding:12px 16px;color:var(--txt2);cursor:pointer;border-radius:var(--radius-sm);}
.mobile-link:hover{background:var(--bg);color:var(--txt);}

/* ── PROGRESS BAR ─────────────────────────────────────── */
.progress-wrap{position:fixed;top:60px;left:0;right:0;height:3px;background:var(--border2);z-index:99;}
.progress-bar{height:100%;background:var(--gold);transition:width .4s ease;border-radius:0 2px 2px 0;}

/* ── APP WRAPPER ──────────────────────────────────────── */
#app{padding-top:63px;}
.view{animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ── HOME HERO ────────────────────────────────────────── */
.hero{
  padding:56px 24px 48px;
  max-width:680px;
  margin:0 auto;
  text-align:center;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--gold-light);border:1px solid var(--gold-border);
  color:var(--gold);font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  padding:6px 16px;border-radius:20px;margin-bottom:24px;
}
.hero h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(32px,6vw,52px);
  font-weight:800;line-height:1.15;
  letter-spacing:-1px;
  color:var(--txt);
  margin-bottom:14px;
}
.hero h1 span{color:var(--gold);}
.hero-sub{font-size:16px;color:var(--txt2);max-width:480px;margin:0 auto 32px;line-height:1.65;font-weight:400;}
.hero-ctas{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
.btn-primary{background:var(--gold);color:#fff;font-weight:700;font-size:14px;padding:13px 28px;border-radius:var(--radius-sm);cursor:pointer;border:none;letter-spacing:.2px;transition:all .2s;box-shadow:0 4px 14px rgba(245,166,35,0.35);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,0.4);}
.btn-outline{background:#fff;color:var(--txt);font-weight:600;font-size:14px;padding:13px 28px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border);transition:all .2s;}
.btn-outline:hover{border-color:var(--muted);background:var(--bg);}
.hero-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;max-width:440px;margin:0 auto;
}
.hero-stat{
  background:#fff;border:1px solid var(--border);
  padding:18px 12px;border-radius:var(--radius);text-align:center;
  box-shadow:var(--shadow-sm);
}
.hero-stat strong{display:block;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--gold);margin-bottom:4px;}
.hero-stat span{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:600;}

/* ── SECTION ──────────────────────────────────────────── */
.section{padding:32px 20px 16px;max-width:1100px;margin:0 auto;}
.divider-line{width:100%;height:1px;background:var(--border2);margin:24px 0;}

/* ── TIER HEADER ──────────────────────────────────────── */
.tier-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:0 4px;}
.tier-badge{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;
}
.tier-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--txt);}
.tier-desc{font-size:13px;color:var(--muted);margin-top:3px;}

/* ── COURSE GRID ──────────────────────────────────────── */
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}

/* ── COURSE CARD ──────────────────────────────────────── */
.c-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  cursor:pointer;transition:all .2s;
  box-shadow:var(--shadow-sm);
}
.c-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:transparent;}
.card-img-wrap{height:140px;overflow:hidden;position:relative;background:var(--bg);}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.c-card:hover .card-img{transform:scale(1.05);}
.card-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.4) 0%,transparent 60%);}
.card-num{position:absolute;top:10px;left:12px;font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.25);padding:2px 8px;border-radius:10px;}
.card-tier{position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:10px;backdrop-filter:blur(8px);}
.card-body{padding:14px 16px;}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--txt);margin-bottom:4px;line-height:1.3;}
.card-tagline{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-tag{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 10px;border-radius:20px;}
.card-arrow{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid var(--border);color:var(--muted);transition:all .2s;}
.c-card:hover .card-arrow{border-color:var(--gold);color:var(--gold);}

/* ── MODULE HERO ──────────────────────────────────────── */
.mod-hero{position:relative;height:220px;overflow:hidden;border-radius:0;}
.mod-hero-img{width:100%;height:100%;object-fit:cover;background:var(--bg);}
.mod-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,rgba(0,0,0,0.2) 60%,transparent 100%);}
.mod-hero-content{position:absolute;bottom:0;left:0;right:0;padding:20px 24px 18px;}
.mod-breadcrumb{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:600;color:#fff;
  background:rgba(255,255,255,0.15);
  padding:5px 12px;border-radius:20px;
  margin-bottom:10px;cursor:pointer;
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);
}
.mod-num{position:absolute;top:16px;right:20px;font-family:'Syne',sans-serif;font-size:48px;font-weight:900;color:rgba(255,255,255,0.08);line-height:1;}
.mod-title{font-family:'Syne',sans-serif;font-size:clamp(20px,4vw,28px);font-weight:800;color:#fff;line-height:1.15;margin-bottom:8px;}
.mod-tagline{font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:10px;font-weight:400;}
.mod-tags{display:flex;gap:6px;flex-wrap:wrap;}
.mod-tag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:10px;}

/* ── TABS ─────────────────────────────────────────────── */
.tabs{
  background:#fff;border-bottom:1px solid var(--border);
  padding:0 24px;display:flex;gap:0;overflow-x:auto;
  scrollbar-width:none;position:sticky;top:60px;z-index:50;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  font-size:13px;font-weight:600;color:var(--muted);
  padding:14px 18px;cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .15s;
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab:hover:not(.active){color:var(--txt2);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ── MOD BODY ─────────────────────────────────────────── */
.mod-body{max-width:820px;margin:0 auto;padding:28px 20px 24px;}

/* ── STATS GRID ───────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
@media(min-width:500px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:var(--bg);border:1px solid var(--border);padding:14px;border-radius:var(--radius-sm);text-align:center;}
.stat-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px;}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}

/* ── INTRO TEXT ───────────────────────────────────────── */
.intro-text{font-size:15px;color:var(--txt2);line-height:1.8;margin-bottom:24px;}
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}

/* ── FLOW DIAGRAM ─────────────────────────────────────── */
.flow-diagram{margin:0 0 24px;padding:20px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.flow-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.flow-row{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.flow-row::-webkit-scrollbar{display:none;}
.flow-item{flex:1;min-width:90px;}
.flow-box{padding:12px 10px;text-align:center;border-radius:var(--radius-sm);font-size:12px;font-weight:700;line-height:1.3;}
.flow-box small{display:block;font-size:10px;font-weight:400;margin-top:3px;opacity:0.75;}
.flow-sep{display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);padding:0 4px;flex-shrink:0;}

/* ── CALLOUT ──────────────────────────────────────────── */
.callout{padding:14px 18px;border-radius:var(--radius-sm);font-size:13px;line-height:1.65;margin:16px 0;}
.callout strong{display:block;margin-bottom:2px;}
.callout-gold{background:var(--gold-light);border-left:3px solid var(--gold);color:var(--txt2);}
.callout-gold strong{color:var(--gold);}
.callout-green{background:var(--green-light);border-left:3px solid var(--green);color:var(--txt2);}
.callout-green strong{color:var(--green);}

/* ── LESSONS ──────────────────────────────────────────── */
.lesson-list{display:flex;flex-direction:column;gap:8px;}
.lesson-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s;box-shadow:var(--shadow-sm);}
.lesson-item.open{border-color:var(--gold-border);}
.lesson-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;}
.lesson-head:hover{background:var(--bg);}
.lesson-idx{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;min-width:28px;}
.lesson-name{font-size:14px;font-weight:600;color:var(--txt);flex:1;line-height:1.4;}
.lesson-arrow{font-size:13px;color:var(--muted);transition:transform .25s;}
.lesson-item.open .lesson-arrow{transform:rotate(180deg);}
.lesson-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.lesson-item.open .lesson-body{max-height:2000px;}
.lesson-inner{padding:4px 16px 20px 56px;}
.lesson-intro-box{background:var(--gold-light);border-left:3px solid var(--gold);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 16px;margin-bottom:20px;}
.lesson-intro-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.lesson-text{font-size:14px;color:var(--txt2);line-height:1.85;margin:0;}
.lesson-pts-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.lesson-points{list-style:none;padding:0;display:flex;flex-direction:column;gap:0;}
.lesson-points li{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border2);}
.lesson-points li:last-child{border-bottom:none;}
.lesson-pt-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;margin-top:1px;}
.lesson-pt-text{font-size:13.5px;color:var(--txt2);line-height:1.75;flex:1;}
.lesson-footer-bar{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid var(--border2);}
.lesson-read-time{font-size:11px;color:var(--muted);font-weight:500;}

/* ── VIDEO CARDS ──────────────────────────────────────── */
.video-grid{display:flex;flex-direction:column;gap:10px;}
.video-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm);}
.video-card:hover{border-color:var(--gold-border);box-shadow:var(--shadow);}
.video-thumb{width:48px;height:36px;background:#EF4444;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.video-info{flex:1;}
.video-title{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:3px;line-height:1.35;}
.video-channel{font-size:12px;color:var(--muted);}
.video-btn{margin-top:8px;display:inline-block;background:#EF4444;color:white;font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;letter-spacing:.3px;}

/* ── TOOLS ────────────────────────────────────────────── */
.tools-grid{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 20px;}
.tool-chip{background:var(--bg);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--txt2);padding:6px 14px;border-radius:20px;transition:all .15s;cursor:default;}
.tool-chip:hover{border-color:var(--gold-border);color:var(--gold);}
.tool-setup-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-sm);}
.tool-setup-card.ts-open{border-color:var(--gold-border);}
.tool-setup-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;}
.tool-setup-head:hover{background:var(--bg);}
.tool-icon{font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:var(--radius-sm);flex-shrink:0;}
.tool-name{font-size:14px;font-weight:700;color:var(--txt);flex:1;}
.tool-cat{font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 10px;border-radius:10px;}
.cost-free{font-size:11px;font-weight:700;color:var(--green);background:var(--green-light);padding:3px 10px;border-radius:10px;}
.cost-paid{font-size:11px;font-weight:700;color:#F97316;background:#FFF7ED;padding:3px 10px;border-radius:10px;}
.tool-arrow{font-size:12px;color:var(--muted);transition:transform .25s;margin-left:4px;}
.tool-setup-card.ts-open .tool-arrow{transform:rotate(180deg);}
.tool-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.tool-body-wrap{padding:4px 16px 16px 62px;}
.tool-setup-card.ts-open .tool-body{max-height:1200px;}
.tool-setup-card.ts-open .tool-body-wrap{display:block;}
.setup-step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border2);}
.setup-step:last-child{border-bottom:none;}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;margin-top:1px;}
.step-text{font-size:13px;color:var(--txt2);line-height:1.65;}
.step-text strong{color:var(--txt);}
.step-text code{background:var(--bg);border:1px solid var(--border);padding:1px 6px;border-radius:4px;font-size:12px;font-family:monospace;color:var(--gold);}

/* ── ACTION LIST ──────────────────────────────────────── */
.action-list{display:flex;flex-direction:column;gap:8px;}
.action-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);}
.action-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;margin-top:1px;}
.action-text{font-size:13px;color:var(--txt2);line-height:1.6;}

/* ── BOTTOM NAV ───────────────────────────────────────── */
.mod-nav{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;
  display:flex;gap:8px;
  background:#fff;border:1px solid var(--border);
  border-radius:50px;padding:6px 12px;
  box-shadow:var(--shadow-lg);
}
.mod-nav-btn{
  display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
  padding:8px 16px;border-radius:40px;cursor:pointer;transition:all .15s;
  border:none;background:transparent;color:var(--txt2);
}
.mod-nav-btn:hover{background:var(--bg);color:var(--txt);}
.mod-nav-btn.primary{background:var(--gold);color:#fff;}
.mod-nav-btn.primary:hover{background:#E8971F;}

/* ── GATE ─────────────────────────────────────────────── */
.gate-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px);}
.gate-overlay.hidden{display:none;}
.gate-box{background:#fff;border-radius:20px;padding:40px 32px;max-width:400px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.15);}
.gate-logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--txt);margin-bottom:4px;}
.gate-logo span{color:var(--gold);}
.gate-tagline{font-size:12px;color:var(--muted);margin-bottom:28px;}
.gate-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--txt);margin-bottom:8px;}
.gate-sub{font-size:14px;color:var(--txt2);margin-bottom:24px;line-height:1.6;}
.gate-input{width:100%;padding:14px 18px;font-size:16px;font-family:'Outfit',sans-serif;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--txt);outline:none;text-align:center;letter-spacing:3px;text-transform:uppercase;transition:border-color .2s;}

  {t:"How the Affiliate System Works: The 4-Part Money Flow",
   text:"Before you earn your first commission you need to understand exactly how money moves in this industry. Affiliate marketing operates as a four-party system: the Merchant (the company that creates and sells the product), the Affiliate Network (the platform managing tracking and payments), the Affiliate (you, the promoter), and the Customer (the buyer). When a customer clicks your unique tracking link and completes a purchase, the network records it, verifies it, and credits your account. You never touch the product, handle refunds, or deal with customer complaints. Your entire job is connecting the right person to the right product at the right time. The reason this model is so powerful is that you carry none of the risk. You do not spend money creating products, you do not manage inventory, and you do not deal with customer service. You are purely a traffic and trust broker. This simplicity is why affiliate marketing generates over ₦28 trillion in commissions globally every year and why it remains the most accessible online income model for beginners.",

   text:"There is a critical difference between content that gets read and content that earns commissions. Most beginners write informational posts that attract curious readers who never buy. High-earning affiliates write content that intercepts people in the buying stage of their decision. The three stages are awareness (learning about a topic), consideration (comparing solutions), and decision (choosing which one to buy). The highest-converting affiliate content lives in the consideration and decision stages. Product reviews, comparisons, and alternatives posts are your money pages.",

  stats:[{l:"Startup Cost",v:"₦0 to ₦80k"},{l:"Income Potential",v:"₦800k to ₦32M/mo"},{l:"First Income",v:"1 to 4 weeks"},{l:"Difficulty",v:"Beginner"}],
  flow:[{l:"Create Product",s:"Once, 1 to 4 weeks"},{l:"List on Platform",s:"Gumroad or Etsy"},{l:"Drive Traffic",s:"SEO or Social"},{l:"Earn Passively",s:"95% margin"}],
  intro:"Digital products are the purest form of online income. You create an asset once: an ebook, template, course, Lightroom preset, Notion system, or spreadsheet, and sell it infinitely with zero additional effort or cost. Margins are often 90 to 95%. One good digital product can generate consistent monthly income for years with no customer service headaches, no shipping delays, and no supply chain issues.",
  lessons:[
    {t:"The 8 Best-Selling Digital Product Categories in 2025",
     text:"Not all digital products sell equally. These categories have the highest demand and lowest creation barriers going into 2025.",
     pts:["Templates: Canva templates, Notion dashboards, Excel spreadsheets, resume templates. Some creators earn $5,000 per month on Etsy selling just one type of template","Ebooks and Guides: a 30-page focused guide at $17 beats a 300-page general book at $3, because specific solutions command premium prices","Presets and Filters: Lightroom, Photoshop, or CapCut presets sell in packs for $10 to $50 with massive volume on platforms like Creative Market","Swipe Files and Research Packs: email templates, content calendars, and caption packs are highly valuable because they save people time directly","Printables: planners, habit trackers, wall art, and journaling sheets have a massive Etsy market with zero shipping costs"]},
    {t:"Validate Your Product Before You Build It",
     text:"The biggest mistake digital product creators make is building in isolation. Always validate your concept first before investing significant time. The fastest validation method is a presale: sell the product at a discount before it is built.",
     pts:["Post on social media: 'I am creating [product]. Who would pay $[price] for this?' If 10 or more people respond positively, build it","Presales with Gumroad can be set up in under 10 minutes. If people pay you, the idea is validated. If nobody pays, you just saved weeks of work","Check Etsy and Gumroad for similar products. If competitors are selling well, that confirms demand. Do not be scared of competition in proven markets","Survey your existing audience or social media followers with a simple 2-question poll: 'Do you struggle with [problem]?' and 'Would you pay $[price] for a solution?'"]},
    {t:"Platforms, Pricing, and Launch Strategy",
     text:"Where you sell determines how much you keep and how much traffic you get. Each platform has a different fee structure and built-in audience.",
     pts:["Gumroad charges a 10% flat fee with some built-in discovery. Great for writers, creators, and any type of digital product","Etsy has a 6.5% transaction fee plus a small listing fee but provides significant built-in traffic for templates and printables","Payhip offers a 5% fee on its free plan, making it cost-effective for beginners who are just starting out","For pricing, start higher than feels comfortable. A $9 product needs 1,000 sales to make $9,000. A $97 product needs only 93 sales for the same result"]},
    {t:"Creating Your First Product in One Week",
     text:"The best product is the one you actually finish and publish. Speed matters more than perfection for your first digital product. Here is how to create and publish something valuable in 7 days.",
     pts:["Day 1 to 2: Identify a specific pain point and create an outline or structure for your product","Day 3 to 4: Build the product using Canva, Notion, or Google Docs. Keep it focused and high-quality","Day 5: Write a simple sales page with a clear headline, three benefits, what is included, and a price","Day 6: Upload to Gumroad or Etsy and write a keyword-rich title and description for discoverability","Day 7: Announce it to every platform you have access to, even if your audience is small"]}
  ],

{
  id:3,tier:1,title:"Freelancing and Service Business",
  tagline:"Turn your existing skills into immediate income. No audience required.",
  tag:"Fastest to Income",img:IMGS.people,
  stats:[{l:"Startup Cost",v:"₦0"},{l:"Income Potential",v:"₦3M to ₦48M/mo"},{l:"First Income",v:"1 to 14 days"},{l:"Difficulty",v:"Beginner"}],
  flow:[{l:"Identify Skill",s:"What you already know"},{l:"Find Clients",s:"Outreach or platforms"},{l:"Deliver Work",s:"Professional quality"},{l:"Get Paid",s:"Then raise rates"}],
  intro:"Freelancing is the fastest path to online income because you are selling skills you already have. Writers, designers, developers, video editors, virtual assistants, and consultants all operate in a global freelance market projected to exceed $450 billion by 2026. The key is not just the skill itself but knowing how to position it, price it correctly, and find clients who will pay premium rates for the results you deliver.",
  lessons:[
    {t:"The Most In-Demand Freelance Skills in 2025",
     text:"The highest-earning freelance skills share one trait: they produce measurable, visible results for clients. Always position every service in terms of the outcome it creates, not the task it involves.",
     pts:["Copywriting and Content Writing: $50 to $300 per article, $500 to $5,000 for sales page copy. Businesses need this constantly and pay well for quality","Web Development and Design: $500 to $10,000 per project with recurring retainers for maintenance and updates","Video Editing: $200 to $2,000 per video. YouTube creators, brands, and social media managers always need editors","AI Prompt Engineering and Workflow Setup: setting up AI systems for businesses earns $1,000 to $5,000 per project and demand is growing exponentially","Paid Ads Management: charge 10 to 15% of monthly ad spend as a management fee. One client spending $10,000 per month earns you $1,000 to $1,500 automatically"]},
    {t:"Pricing: Stop Charging Too Little",
     text:"The most common and damaging mistake new freelancers make is dramatically underpricing. Low prices signal low quality. Clients who pay premium rates are generally more professional, more respectful, and give better feedback.",
     pts:["Charge based on value, not time. If your landing page generates $10,000 extra in client revenue, charging $200 for it is leaving money on the table","The positioning shift: instead of 'I write blog posts at $50 each', try 'I create SEO content that ranks on Google and drives qualified traffic for 6 to 12 months after publication'","Research market rates on Upwork for your skill level, then add 30%. You can always negotiate down but you can never negotiate up after quoting too low","Raise rates after every three successful projects. This signals growth and also naturally filters for higher-quality clients over time"]},
    {t:"Where to Find High-Paying Clients",
     text:"Client acquisition has two modes: outbound (you find them) and inbound (they find you). Outbound gets results in days. Inbound takes months to build but compounds over time. Serious freelancers use both.",
     pts:["Outbound on LinkedIn: search for decision-makers in your target industry, send personalized connection requests, follow up with value before making a pitch. 10 messages per day yields 2 to 5 responses","Upwork and Fiverr: excellent for building your first portfolio and collecting reviews, but not sustainable long-term because of their 20% platform fee","Cold Email: find businesses that need your service. Use Hunter.io to find decision-maker email addresses. Send 20 personalized emails per day with a specific observation about their business","After your first 5 clients, ask directly: 'Do you know anyone else who could benefit from this service?' Referral clients close at 3 times the rate of cold outreach"]},
    {t:"From Solo Freelancer to Agency Owner",
     text:"The ceiling for solo freelancing is your available hours. Once you are fully booked at $3,000 to $5,000 per month, the next step is to productize your service and hire contractors to deliver it while you focus on sales and strategy.",
     pts:["Productizing means creating fixed-scope, fixed-price packages. Instead of custom pricing, offer '3-page business website in 10 days for $2,500'","Hire one junior contractor to handle delivery. Pay them 40 to 50% of what you charge the client. Your job becomes quality control and client communication","Start with one contractor before building a team. Test their work quality thoroughly before scaling your outreach to fill their capacity","This model transforms a $5,000 per month ceiling into $15,000 per month potential with just two people working together"]}
  ],
  tools:[
  {name:"Upwork",icon:"💼",cat:"Find Clients",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free (20% fee)",costType:"free",
   steps:[
    "Go to <strong>upwork.com</strong> and click <em>Sign Up as a Freelancer</em>.",
    "Upload a clear professional photo and write a title that includes your skill and target client, e.g. <em>SEO Writer for SaaS and B2B Brands</em>.",
    "In the Overview section write 3 to 4 sentences describing the specific outcome you deliver, not just your skills. Start with the client's problem, not your experience.",
    "Set your hourly rate about 20% higher than your actual target so you have room to negotiate without going below your floor.",
    "Add 3 to 5 portfolio samples. If you do not have real client work yet, create sample pieces specifically for your Upwork profile to show quality.",
    "When applying to jobs, read the full job post carefully and reference 2 to 3 specific details from it in your proposal. Generic proposals are ignored instantly.",
    "Your first goal is 5 five-star reviews. Accept slightly lower rates for your first 5 projects to build your review score, then raise your rates."
   ]},
  {name:"Notion (Portfolio + CRM)",icon:"📓",cat:"Free CRM",catColor:"rgba(0,229,255,0.12)",catTxt:"#00B8CC",cost:"Free",costType:"free",
   steps:[
    "Go to <strong>notion.so</strong> and create a free account.",
    "Create a new page called <em>My Portfolio</em>. Add a cover image and icon to make it look professional.",
    "Click the <strong>+</strong> icon and add a <em>Gallery</em> database. Name it <em>Portfolio</em>. Add properties: Project Name, Client Type, Skills Used, and Result (fill in the measurable outcome).",
    "For each portfolio piece add a card with a screenshot, description of the work, and a one-line result statement.",
    "Create a second page called <em>Client CRM</em>. Add a Table database with columns: Name, Contact, Source, Status (Lead / Proposal / Active / Done), and Value.",
    "Click <strong>Share</strong> on your Portfolio page and turn on <em>Share to web</em>. This gives you a free public URL at notion.so/your-name you can send to prospects.",
    "Add a link to your Calendly booking page at the bottom of your Portfolio so prospects can book a call without any back-and-forth emailing."
   ]},
  {name:"Hunter.io",icon:"🎯",cat:"Lead Finding",catColor:"rgba(255,45,107,0.12)",catTxt:"#CC2255",cost:"Free (25/mo)",costType:"free",
   steps:[
    "Go to <strong>hunter.io</strong> and create a free account. Free tier gives you 25 email searches and 50 verifications per month.",
    "To find emails for a company: type the company's domain name in the search bar and click Enter. Hunter shows all publicly known emails at that domain.",
    "To find one specific person: click <strong>Email Finder</strong>, enter the domain and the person's first and last name. Hunter predicts their email with a confidence score.",
    "Only use emails with a confidence score of 70% or higher to avoid bounced emails that damage your sender reputation.",
    "Before sending, click <strong>Verify</strong> to confirm the email is deliverable.",
    "Export prospect lists as CSV under the <strong>Leads</strong> section and import them into your outreach tool or use them directly in Gmail."
   ]},
  {name:"Calendly",icon:"📅",cat:"Booking",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free",costType:"free",
   steps:[
    "Go to <strong>calendly.com</strong> and sign up with Google. The free plan allows one event type.",
    "Click <strong>New Event Type</strong> and choose One-on-One. Name it <em>15-Minute Discovery Call</em> or <em>Free Consultation</em>.",
    "Connect your Google Calendar so Calendly automatically shows only your available slots.",
    "Set your availability: the days and hours you are willing to take calls. Set a <strong>minimum scheduling notice</strong> of at least 4 hours so people cannot book a call in 30 minutes.",
    "Enable the <strong>Invitee Questions</strong> feature. Add 2 questions: What is your biggest challenge right now? and What is your monthly budget for this service?",
    "Copy your Calendly link and add it to your email signature, LinkedIn bio, and Notion portfolio page.",
    "After each call, Calendly automatically sends a confirmation and reminder email to both parties, eliminating no-shows."
   ]}
],
  actions:["Write down the one skill you can deliver at a professional level right now, today","Create a simple portfolio using Notion, Carrd, or a basic website with 2 to 3 work samples","Identify 50 businesses online that could benefit from your specific service","Send 10 personalized outreach messages per day across LinkedIn and email","Offer your first client a discounted trial rate in exchange for a written testimonial","After delivering excellent work, ask directly for a referral and raise rates for the next client"],

{
  id:4,tier:1,title:"Content Creation and Blogging",
  tagline:"Build a media asset that generates traffic and income for years",
  tag:"Long-Term Asset",img:IMGS.write,
  stats:[{l:"Startup Cost",v:"₦80k to ₦240k"},{l:"Income Potential",v:"₦2M to ₦160M/mo"},{l:"First Income",v:"3 to 12 months"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Choose Niche",s:"Research + validate"},{l:"Publish Content",s:"SEO optimized"},{l:"Rank on Google",s:"Organic traffic"},{l:"Multiple Revenue",s:"Ads, affiliates, products"}],
  intro:"A blog is not just a hobby website. It is a business asset. A well-built blog in a profitable niche can generate income simultaneously through display ads, affiliate links, sponsored posts, and digital product sales. Some blogs generate $50,000 to $500,000 per year. The key is treating it like a media company from day one: systematic keyword research, consistent publishing, and strategic monetization layered in over time.",
  lessons:[
    {t:"Choosing a Blog Niche That Can Make You Serious Money",
     text:"Not all niches are equal when it comes to monetization. The most important factor is CPM (revenue per thousand pageviews) which varies dramatically across topics.",
     pts:["Finance, legal, insurance, and software niches have CPMs of $20 to $50. Recipes and entertainment have CPMs of $2 to $5. Same traffic, completely different income","The second factor is affiliate program availability. A personal finance blog can promote credit cards ($50 to $200 per approval), investing platforms, and financial software simultaneously","Evaluate every potential niche across three dimensions: search volume (are people searching for this?), monetization (what affiliate programs or advertisers serve this niche?), and competition (can you realistically compete?)","Passion alone is not enough, but working in a niche you understand deeply gives you a major content quality advantage over writers who are just doing keyword research"]},
    {t:"The SEO Content System That Builds Compounding Traffic",
     text:"Every blog that generates serious income is built on an SEO foundation. Organic Google traffic is the most valuable traffic because it is free, targeted, and compounds over time as your domain authority grows.",
     pts:["Target keywords with clear buyer intent: 'best project management software for freelancers' is worth 100 times more than 'what is project management'","Every post should follow the AIDA structure: Attention (hook the reader in the first 100 words), Interest (provide unique insight), Desire (show them the outcome they want), Action (tell them exactly what to do next)","Aim for 1,500 to 3,000 words per post on competitive topics. Longer, more comprehensive content ranks better and keeps readers on the page longer","Internal linking between posts is crucial. Every new post should link to 2 to 3 existing posts, and every existing post should eventually link back to the new one"]},
    {t:"The 4 Revenue Streams Every Serious Blog Should Have",
     text:"The biggest income blogs are not dependent on any single revenue source. They layer multiple monetization methods that reinforce each other.",
     pts:["Display Advertising: once you reach 10,000 monthly sessions, apply to Mediavine or Raptive. These premium networks pay $20 to $50 RPM versus Google AdSense's $2 to $5","Affiliate Marketing: layer affiliate links throughout relevant content. A single well-ranked review post can generate $500 to $5,000 per month passively","Sponsored Posts: brands pay $200 to $5,000 or more for a single sponsored article once your blog has authority and consistent traffic","Digital Products: sell ebooks or templates directly to your existing audience. A 1,000-person email list converting at 2% to a $47 product generates $940 per email campaign sent"]},
    {t:"90-Day Launch Plan: From Zero to Growing Blog",
     text:"Most blogs fail because their owners approach them as a hobby rather than a business. This 90-day plan treats it like a media startup from day one.",
     pts:["Week 1 to 2: set up WordPress with Astra or GeneratePress theme. Configure Yoast SEO plugin. Register your domain with a focus on your niche keyword","Week 3 to 4: conduct keyword research and build a list of 30 articles to publish over the next 90 days. Mix 60% informational with 40% buyer-intent posts","Month 2: publish 12 articles. Set up Google Analytics and Search Console. Add your first email opt-in with a relevant lead magnet","Month 3: apply for affiliate programs. Add affiliate links to relevant posts. Check Search Console for which keywords are getting impressions and double down on them"]}
  ],
  tools:[
{name:"WordPress + Hostinger",icon:"🌐",cat:"Blog Platform",catColor:"rgba(0,229,255,0.12)",catTxt:"#00B8CC",cost:"~$3/mo",costType:"paid",steps:[
  "Go to <strong>hostinger.com</strong>, choose Business Hosting (~$3/mo). Includes free domain for year one.",
  "In hPanel click <strong>Websites → Create New Website → WordPress</strong>. Fill in site details. WordPress installs in 2 minutes.",
  "Log into <code>yourdomain.com/wp-admin</code>. Go to <strong>Appearance → Themes → Add New</strong>, search <em>Astra</em>, install and activate.",
  "Go to <strong>Plugins → Add New</strong>. Install: <em>Yoast SEO</em>, <em>WP Rocket</em>, <em>Google Site Kit</em>, <em>Rank Math</em>.",
  "In Yoast SEO go to <strong>General → Features</strong> and enable all toggles. Fill in site title and tagline with your niche keywords.",
  "Connect Google Analytics and Search Console via <strong>Site Kit → Settings → Connect More Services</strong>."
]},
{name:"Yoast SEO",icon:"📝",cat:"SEO Plugin",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free",costType:"free",steps:[
  "Install from <strong>WordPress → Plugins → Add New</strong>. Search <em>Yoast SEO</em>, install and activate.",
  "Click the <strong>Yoast SEO</strong> icon in your dashboard. Complete the Setup Wizard — set site type, organization name, and social profiles.",
  "Every post now shows a Yoast panel below the editor. Fill in the <strong>Focus Keyphrase</strong> field with your target keyword.",
  "Follow the traffic light: Green = good, Orange = needs work, Red = fix before publishing. Aim for all green before hitting publish.",
  "Go to <strong>Yoast → Search Appearance → Content Types</strong>. Set Posts to 'Show in search results' and Pages to 'Show in search results'.",
  "Enable <strong>XML Sitemaps</strong> under General → Features. Submit the sitemap URL to Google Search Console."
]},
{name:"Ubersuggest",icon:"🔍",cat:"Keyword Research",catColor:"rgba(123,110,255,0.12)",catTxt:"#7B6EFF",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>app.neilpatel.com/en/ubersuggest</strong> and sign in free with Google.",
  "Type your target keyword and hit Search. Note: <strong>Search Volume</strong> (monthly searches), <strong>SEO Difficulty</strong> (aim under 40), <strong>CPC</strong> (advertiser value).",
  "Click <strong>Keyword Ideas</strong> in the sidebar. Filter by SD under 40 and Volume over 500 to find winnable keywords.",
  "Click any keyword → <strong>SERP Analysis</strong>. If sites with Domain Authority under 30 are ranking, you can compete.",
  "Export your keyword list as CSV. Use this to plan your first 30 blog posts before writing a single word.",
  "Run your own domain in the search bar to see your current rankings and find content gaps."
]},
{name:"Google Search Console",icon:"📊",cat:"SEO Analytics",catColor:"rgba(0,240,134,0.12)",catTxt:"#00C070",cost:"Free",costType:"free",steps:[
  "Go to <strong>search.google.com/search-console</strong> and sign in with Google. Click <strong>Add Property</strong>.",
  "Enter your full site URL with <code>https://</code>. Choose <strong>HTML tag</strong> verification and copy the meta tag.",
  "In WordPress go to <strong>Yoast SEO → General → Webmaster Tools</strong>. Paste the tag in the Google field. Save.",
  "Back in Search Console click <strong>Verify</strong>. Verification takes a few minutes.",
  "Go to <strong>Sitemaps</strong> in the left sidebar. Type <code>sitemap.xml</code> and click Submit.",
  "After 2 to 4 weeks check the <strong>Performance</strong> tab to see which keywords drive clicks and impressions. Double down on those topics."
]},
{name:"ConvertKit / Kit",icon:"✉",cat:"Email List",catColor:"rgba(255,45,107,0.12)",catTxt:"#CC2255",cost:"Free to 1k subs",costType:"free",steps:[
  "Go to <strong>kit.com</strong> and click Get Started Free. No credit card required. Free plan supports 1,000 subscribers.",
  "Complete onboarding: your name, what you create, and your website URL.",
  "Go to <strong>Grow → Landing Pages and Forms → Create New</strong>. Choose Inline for embedding inside blog posts.",

  "Go to <strong>Automations → New Automation</strong>. Trigger: subscriber joins form. Build a 5-email welcome sequence with Email + Delay blocks.",
  "Click <strong>Embed</strong> on your form. In WordPress paste the code in any post using a Custom HTML block."
]}

{
  id:5,tier:1,title:"Email Marketing as a Business",
  tagline:"The asset no algorithm can take from you. $42 ROI per $1 spent.",
  tag:"Highest ROI Channel",img:IMGS.email,
  stats:[{l:"Startup Cost",v:"₦0 to ₦3k9/mo"},{l:"Income Potential",v:"₦2M to ₦80M/mo"},{l:"First Income",v:"1 to 3 months"},{l:"Difficulty",v:"Beginner"}],
  flow:[{l:"Lead Magnet",s:"Free valuable resource"},{l:"Subscriber Joins List",s:"Owned asset"},{l:"Email Sequence",s:"Trust and authority"},{l:"Promotion or Sale",s:"$36 ROI per $1 spent"}],
  intro:"Email marketing returns an average of $36 to $42 for every $1 spent. It is the highest ROI channel in all of digital marketing, and unlike social media, your email list is an asset you own completely. Instagram can ban you overnight. Google can derank your blog. Nobody can take your email list away from you. A list of 5,000 engaged subscribers can generate $5,000 to $25,000 per single promotional campaign when done correctly.",
  lessons:[
    {t:"Building Your List: The Lead Magnet System That Works",
     text:"Nobody trades their email address for nothing. You need a lead magnet: a free, high-value resource that solves a specific problem immediately and delivers a quick win to the subscriber.",
     pts:["Bad lead magnet: 'Sign up for my newsletter.' Good lead magnet: 'Download the 5-Step Framework That Got Me to $5,000 per Month Online, completely free'","The best formats: a focused PDF checklist (quick to create, quick to consume), a free mini-course delivered over 3 to 5 emails, a template or toolkit with immediate practical value","Create one lead magnet and test it before building more. Conversion rate matters more than volume. A targeted lead magnet converting at 30% beats a generic one converting at 3%","Promote your lead magnet everywhere: blog posts, social media bios, YouTube descriptions, podcast show notes, and any platform where your audience spends time"]},
    {t:"The 7-Email Welcome Sequence That Converts",
     text:"Your welcome sequence is the most important automated asset you will ever build. It sets the tone for the entire subscriber relationship and does the heavy lifting of converting new leads into buyers.",
     pts:["Email 1 (Immediate): deliver the lead magnet and set expectations for what is coming. Make it warm and personal, not corporate","Email 2 (Day 1): share your story in a relatable way that shows you understand exactly the problem your subscriber is facing","Email 3 (Day 2): pure value, your single best tip or insight related to their core problem. Zero selling in this email","Email 4 (Day 3): a case study or success story that builds social proof before you make any offer","Email 5 (Day 5): address the 3 most common objections or mistakes your audience makes. This positions you as the expert","Email 6 (Day 7): soft introduction to your paid product or affiliate offer, framed as a natural next step in their journey","Email 7 (Day 9): direct offer with urgency and a specific benefit statement. This is where 60 to 70% of sequence sales happen"]},
    {t:"5 Ways to Monetize Your Email List",
   text:"Your email list is the most direct line to revenue in your business. Unlike social media where algorithms control your reach, email lands in the inbox of every subscriber. These five monetisation methods can be stacked on top of each other simultaneously.",
     pts:["Affiliate promotions: a single email to a 2,000-person list promoting a relevant affiliate product can generate $200 to $5,000 in commissions","Product launches: use a 5-email launch sequence over one week. Day 1 is the announcement with an early-bird price. Day 3 adds value and testimonials. Day 7 is the final call email which generates 30 to 40% of all launch revenue","Newsletter sponsorships: once you have 2,000 or more subscribers, brands will pay $200 to $2,000 per email to reach your audience directly","Paid newsletter tier: offer exclusive premium content for $5 to $20 per month. Even 100 paying subscribers generates $500 to $2,000 in recurring monthly income","Tripwire offers: immediately after someone downloads your free lead magnet, offer a low-cost product at $7 to $27. This converts at 5 to 15% because trust is highest in that moment"]},
    {t:"Growing Your List Beyond Your First 100 Subscribers",
     text:"Building an email list from zero feels slow at first, but it accelerates dramatically once you have systems in place and multiple traffic sources feeding your opt-in pages.",
     pts:["Content upgrades perform 300 to 400% better than general lead magnets. Create a specific bonus for each major blog post that gives readers a reason to subscribe right now","Guest posting on larger publications in your niche drives targeted new subscribers who already trust you because a site they read featured you","Pinterest is consistently one of the highest-converting social platforms for email list building because users are in active research and discovery mode","A referral program where subscribers earn rewards for recommending your list can create viral growth with zero additional traffic investment"]}
  ],

  stats:[{l:"Startup Cost",v:"₦0 to ₦800k"},{l:"Income Potential",v:"₦3M to ₦160M/mo"},{l:"First Income",v:"3 to 9 months"},{l:"Difficulty",v:"Intermediate"}],
  flow:[{l:"Create Videos",s:"Tutorial or review"},{l:"Grow Subscribers",s:"SEO + consistency"},{l:"Multiple Revenue",s:"Ads, sponsors, products"},{l:"Scale and Outsource",s:"Compound income"}],
  intro:"YouTube is the only platform where your content generates income from day one through affiliate links in descriptions and builds toward passive ad revenue over time. A channel with 50,000 subscribers in a high-CPM niche can generate $5,000 to $20,000 per month from ads alone, then stack sponsorships, merchandise, courses, and affiliate income on top. The key is choosing the right niche and understanding how the algorithm actually works.",
  lessons:[
    {t:"Channel Strategy: Niche, Format, and Upload Cadence",
     text:"The most monetizable YouTube niches by CPM (what advertisers pay per 1,000 views): Finance and investing ($15 to $40), software and tech tutorials ($8 to $20), business and entrepreneurship ($10 to $25), health and medical ($8 to $15). Entertainment and gaming have CPMs of $1 to $5, meaning you would need 10 times the views to match a small finance channel.",
     pts:["Tutorial channels compound best over time because they answer specific search queries that people ask repeatedly year after year","Review channels generate strong affiliate income because viewers are already in buying mode when they search for product reviews","Consistency matters more than quality at first. One video per week for 52 weeks beats sporadic uploads of perfect videos","Pick one primary format and master it before adding new content types. Depth before breadth builds algorithm momentum"]},
    {t:"The 7 Income Streams for a YouTube Channel",
   text:"YouTube rewards creators with multiple income layers as channels grow. The smartest creators do not wait for AdSense — they stack income streams from day one, treating YouTube as a traffic engine that feeds every other revenue source they own.",
     pts:["AdSense requires 1,000 subscribers and 4,000 watch hours. Average $2 to $15 per 1,000 views depending on niche and audience location","Affiliate links in your description are available from day one and can earn more per video than ads, especially for software and product reviews","Sponsorships: brands pay $500 to $50,000 or more per video once you have an engaged audience. Negotiate based on average views per video, not total subscriber count","Channel Memberships at 30,000 subscribers: fans pay $5 to $25 per month for exclusive perks and early access content","Courses and digital products: funnel YouTube viewers to your email list and sell higher-ticket offers directly to your most engaged fans","Super Chats during live streams allow fans to pay for highlighted messages. Popular streamers earn $500 to $5,000 per live session","Merchandise via YouTube's shelf or Printful integration, available once you reach specific subscriber thresholds"]},
    {t:"The YouTube Algorithm: What Actually Drives Growth",
     text:"The algorithm has one goal: keep people watching. It promotes videos that combine high Click-Through Rate (CTR) with high Average View Duration (AVD). Every upload decision should optimize for both of these metrics.",
     pts:["CTR is driven by your thumbnail and title. Use high contrast images, readable text, and expressive facial reactions when appropriate","Titles should answer a question, create curiosity, or make a clear promise. 'How I Made $5,000 in My First Month' always outperforms 'My Income Journey'","AVD is driven by your script and editing. Hook viewers in the first 30 seconds. Cut anything that does not serve the main promise of the video","Pattern interrupts every 20 to 30 seconds: text overlays, B-roll cutaways, and scene changes keep viewers watching through the full video","Study channels like Ali Abdaal, Graham Stephan, or Andrei Jikh to understand how high-retention pacing is structured and executed"]},
    {t:"Growing a Channel Without Buying Ads",
   text:"Organic YouTube growth is entirely achievable without spending a naira on advertising. The algorithm is built to distribute content that keeps viewers watching. Master these signals and the platform promotes your content for free.",
     pts:["YouTube SEO is real: research keywords with TubeBuddy or VidIQ to find search terms your target audience uses but that have low competition","Consistent thumbnails create a recognizable brand. Design a template and stick to it so viewers recognize your content in their feed instantly","Comment actively on larger channels in your niche during the first hour after their video is posted. This puts your channel in front of their most engaged audience","Collaborate with channels of similar size. Guest appearances drive subscriber crossover and both channels benefit from reaching each other's audience"]}
  ],

{
  id:7,tier:2,title:"TikTok and Instagram Income",
  tagline:"Short-form video is the fastest audience builder in history. Monetize it properly.",
  tag:"Creator Economy",img:IMGS.phone,
  stats:[{l:"Startup Cost",v:"₦0"},{l:"Income Potential",v:"₦800k to ₦80M/mo"},{l:"First Income",v:"2 to 8 weeks"},{l:"Difficulty",v:"Beginner"}],
  flow:[{l:"Short-Form Content",s:"TikTok or Reels"},{l:"Bio Link",s:"Linktree or Stan Store"},{l:"Email List",s:"Owned audience"},{l:"Products and Offers",s:"High margin sales"}],
  intro:"Short-form video has the highest organic reach of any content format alive today. A new account on TikTok or Instagram Reels can reach 100,000 people in the first week with zero followers and zero ad spend. The creator economy on these two platforms alone exceeds $100 billion annually. The key is understanding that platform native income (views, gifts, bonuses) is the smallest piece. The real money comes from using reach as the top of your business funnel.",
  lessons:[
    {t:"The Short-Form Hook Formula That Stops the Scroll",
     text:"Every successful short-form video follows a predictable structure. The first 1 to 2 seconds must stop the scroll. The middle delivers the promised value quickly. The end drives a specific action: a comment, follow, or click to your bio link.",
     pts:["Hook formulas that consistently work: 'Here is what nobody tells you about [topic]' or 'I tried [unusual thing] for 30 days, here is what happened'","The most shareable content triggers one of four emotions: surprise, validation, entertainment, or urgent desire to share with someone specific","Pattern interrupts every 3 to 5 seconds: text overlays, sound effects, cut to B-roll, or change in camera angle maintain attention throughout","End every video with a clear call to action. 'Follow for part 2' or 'Comment your answer below' gives the algorithm a signal that your content generates engagement"]},
    {t:"Turning Platform Reach into Real Business Income",
     text:"Platform monetization alone rarely builds wealth. The serious income comes from using TikTok and Instagram as acquisition channels and moving audiences to owned assets like your email list, website, or digital products.",
     pts:["Every piece of content should have a purpose beyond views: driving people to your bio link, building authority in your niche, or starting a conversation that leads to a sale","Your bio link should lead to a landing page with a lead magnet. Convert viewers into email subscribers who you own and can contact anytime regardless of algorithm changes","Creators who sell their own products from short-form content consistently outperform those who rely only on brand deals or platform bonuses","TikTok Shop allows you to tag products directly in videos and earn a commission when viewers purchase without ever leaving the app"]},
    {t:"Brand Deals: How to Get Sponsored as a Creator",
   text:"Brand sponsorships are often the highest-earning income stream for creators, sometimes paying more per video than months of AdSense. Brands are not just looking for the biggest channels — they are looking for the most targeted and engaged audiences relative to their product.",
     pts:["Brands look at three things: engagement rate (aim for 3% or higher), audience demographics (are they the brand's target customer?), and content quality","Reach out proactively: identify brands that already sell to your audience and send a clear, short pitch with your stats, one content idea, and a proposed rate","Rates for sponsored content in 2025: TikTok $200 to $5,000 per post depending on following and niche; Instagram $300 to $20,000 per post for mid-size accounts","Platforms like AspireIQ, Creator.co, and the TikTok Creator Marketplace connect creators with brands looking for collaborations"]},
    {t:"The Content Calendar: How to Post Consistently Without Burning Out",
   text:"Inconsistency is the number one reason creators fail. The solution is not willpower — it is a system that removes the daily decision of what to create. A well-built content calendar means you always know what to post next and maintain your schedule even during your busiest weeks.",
     pts:["Batch-create content: dedicate one day per week to filming 5 to 7 videos at once. Edit them throughout the week and schedule posts using Later or Buffer","Repurpose your best-performing videos across both platforms. A TikTok that went viral works as an Instagram Reel and a YouTube Short","Track your analytics weekly: note which video styles, topics, and hooks perform best. Build your next batch around what already works","Rest is part of the system. Creator burnout is real and recoverable. Building sustainable content systems matters more than posting every single day"]}
  ],

  flow:[{l:"Create Pins",s:"Vertical image + keyword"},{l:"Rank in Search",s:"Pinterest SEO"},{l:"Drive Blog Traffic",s:"Years of passive visits"},{l:"Monetize Traffic",s:"Affiliate or ads"}],
  intro:"Pinterest is the most underrated traffic source in online business. It operates as a visual search engine where pins rank and drive traffic for months or years after being posted. A single well-optimized pin in a high-interest niche can send thousands of visitors to your affiliate content indefinitely. Unlike Instagram or TikTok which die within 24 hours of posting, Pinterest content compounds.",
  lessons:[
    {t:"How Pinterest SEO Works and Why It Differs from Google",
   text:"Pinterest is a search engine first and a social network second. Every pin is searchable content that can drive traffic for months or years after it is published. Unlike Instagram where content disappears in 24 hours, a well-optimised pin compounds in visibility over time.",text:"Pinterest is a search engine first and a social network second. Every pin is searchable content that can drive traffic for months or years after it is published. Unlike Instagram where content disappears in 24 hours, a well-optimised Pinterest pin compounds in visibility over time — making it one of the most powerful passive traffic sources available.",pts:["Pinterest uses keyword-rich descriptions and board names to categorize and surface pins in search results. Treat every pin description as a mini SEO post","Vertical images (2:3 ratio, 1000x1500 pixels) perform significantly better than horizontal ones because they take up more screen space in the feed","Fresh content signals matter: Pinterest rewards accounts that pin consistently. Aim for 10 to 15 pins per day using a scheduler like Tailwind","Group boards with large followings can distribute your pins to an audience far beyond your own followers when you are accepted as a contributor"]},
    {t:"Monetizing Pinterest Traffic",
   text:"Pinterest traffic is high purchase-intent traffic. Users come specifically looking for ideas, products, and solutions — which means they convert to buyers at significantly higher rates than general social media traffic.",text:"Pinterest traffic is high purchase-intent traffic. Users come specifically looking for ideas, products, and solutions — which means they convert to buyers at significantly higher rates than general social media traffic. Once you have steady traffic, these monetisation methods layer on top of each other naturally.",pts:["Affiliate links can be added directly to pins without needing a blog. You earn commissions when pinners click through and purchase from the merchant","Blog traffic: drive pinners to your blog posts where they click affiliate links, see display ads, and join your email list. This is the most scalable Pinterest monetization model","Digital products on Etsy: create pins linking directly to your Etsy shop for templates and printables. Many Etsy sellers generate 60 to 80% of their traffic from Pinterest alone","Sponsored pins: once your account has significant reach, brands in your niche will pay $100 to $2,000 for a promoted pin campaign"]}
  ],

  "Create boards around your niche topics. Each board title should be a keyword phrase e.g. <em>Affiliate Marketing Tips</em> not just <em>Marketing</em>.",
  "Enable <strong>Rich Pins</strong>: go to <strong>developers.pinterest.com/tools/url-debugger</strong>, enter your site URL, and apply for Rich Pins. This pulls your article title and description automatically onto pins.",
  "Check <strong>Pinterest Analytics</strong> weekly. Focus on Impressions and Outbound Clicks — that is traffic to your site."
]},
{name:"Canva (Pin Design)",icon:"🎨",cat:"Design",catColor:"rgba(255,202,44,0.12)",catTxt:"#C8841A",cost:"Free / $13/mo",costType:"free",steps:[
  "Go to <strong>canva.com → Create a Design → Pinterest Pin</strong> (1000x1500px — the ideal 2:3 ratio).",
  "High-performing pin formula: vertical image, large readable text overlay, your website URL at the bottom.",
  "Use bright, warm colors — red, orange, and warm tones outperform cool blues on Pinterest.",
  "Create a pin template with your brand colors and save it. Use this template for every new pin to build visual consistency.",
  "Add text that describes the outcome: <em>How I Made $3,000 with Affiliate Marketing</em> beats <em>Affiliate Marketing Tips</em>.",
  "Download as PNG. In Pinterest click <strong>Create → Create Pin</strong>, upload the image, add title, description with keywords, and your article URL."
]},
{name:"Tailwind",icon:"📅",cat:"Scheduling",catColor:"rgba(123,110,255,0.12)",catTxt:"#7B6EFF",cost:"Free tier",costType:"free",steps:[
  "Go to <strong>tailwindapp.com</strong> and connect your Pinterest account.",
  "Click <strong>Create → New Pin</strong>. Upload your pin image and fill in the title, description, and destination URL.",

  "Use <strong>Tribes</strong> (now Communities) to share your pins with other creators in your niche and get reshares.",
